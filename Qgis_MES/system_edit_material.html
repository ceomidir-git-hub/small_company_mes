<!DOCTYPE html>
<html lang="ko" class="auth-pending">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>재질 관리 | HeatPro MES</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #f4f6f9;
      --card: #ffffff;
      --line: #cfd6e1;
      --line-soft: #e3e8ef;
      --text: #1f2937;
      --muted: #64748b;
      --blue: #1f5edb;
      --blue-dark: #1647ad;
      --green: #079660;
      --green-dark: #05784d;
      --red: #dc2f45;
      --red-dark: #b91f34;
      --orange: #e38b20;
      --shadow: 0 3px 12px rgba(15, 23, 42, 0.06);
      --radius: 9px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    html.auth-pending body {
      visibility: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .page {
      width: 100%;
      margin: 0 auto;
      padding: 12px;
    }

    /* 상단 제목 / 메인화면 프레임 */
    .title-frame {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .title-area h1 {
      margin: 0;
      color: #0e3f9d;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: -0.5px;
    }

    .file-name {
      margin-left: 5px;
      color: #667085;
      font-size: 12px;
      font-weight: 400;
    }

    .subtitle {
      margin-top: 5px;
      color: #5f6b7a;
      font-size: 12px;
    }

    .main-button {
      min-width: 112px;
      height: 42px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #1f2937;
      font-weight: 700;
      box-shadow: var(--shadow);
    }

    .main-button:hover {
      background: #f8fafc;
    }

    /* 조회 프레임 */
    .search-frame {
      display: grid;
      grid-template-columns: minmax(170px, 220px) minmax(220px, 320px) auto;
      align-items: end;
      gap: 14px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .field label {
      color: #445267;
      font-size: 12px;
      font-weight: 700;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      min-height: 40px;
      padding: 8px 10px;
      border: 1px solid #c7d0dc;
      border-radius: 7px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .field textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.5;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(31, 94, 219, 0.12);
    }

    .search-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn {
      min-height: 40px;
      padding: 8px 16px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: #1f2937;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .btn:hover {
      filter: brightness(0.97);
    }

    .btn-blue {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    .btn-blue:hover {
      background: var(--blue-dark);
    }

    .btn-green {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
    }

    .btn-green:hover {
      background: var(--green-dark);
    }

    .btn-red {
      border-color: var(--red);
      background: var(--red);
      color: #fff;
    }

    .btn-red:hover {
      background: var(--red-dark);
    }

    .btn-orange {
      border-color: var(--orange);
      background: var(--orange);
      color: #fff;
    }

    /* 안내 및 업무 버튼 프레임 */
    .action-frame {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 0;
    }

    .guide-text {
      color: #617087;
      font-size: 12px;
    }

    .action-buttons {
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    /* 등록/수정 입력 프레임 */
    .editor-frame {
      display: none;
      margin-bottom: 12px;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .editor-frame.show {
      display: block;
    }

    .editor-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .editor-head h2 {
      margin: 0;
      color: #0e3f9d;
      font-size: 17px;
    }

    .mode-badge {
      padding: 5px 10px;
      border-radius: 999px;
      background: #e9eef7;
      color: #45556d;
      font-size: 11px;
      font-weight: 800;
    }

    .mode-badge.new {
      background: #e6f7ef;
      color: #047857;
    }

    .mode-badge.edit {
      background: #fff3df;
      color: #a35405;
    }

    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1.3fr 1fr 1fr;
      gap: 12px;
    }

    .editor-grid .full {
      grid-column: 1 / -1;
    }

    .char-count {
      margin-top: 4px;
      color: #64748b;
      font-size: 11px;
      text-align: right;
    }

    /* 목록 프레임 */
    .list-frame {
      padding: 14px 16px 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .list-title {
      margin: 2px 0 12px;
      color: #0e3f9d;
      font-size: 18px;
      text-align: center;
    }

    .table-wrap {
      width: 100%;
      max-height: 560px;
      overflow: auto;
      border: 1px solid #cbd5e1;
      background: #fff;
    }

    table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 12px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 3;
      padding: 10px 8px;
      border-right: 1px solid #1248a9;
      border-bottom: 1px solid #1248a9;
      background: #1e5bd7;
      color: #fff;
      font-weight: 800;
      text-align: center;
      white-space: nowrap;
    }

    tbody td,
    tfoot td {
      padding: 9px 8px;
      border-right: 1px solid #d8dee8;
      border-bottom: 1px solid #d8dee8;
      text-align: center;
      vertical-align: middle;
    }

    tbody tr {
      cursor: pointer;
    }

    tbody tr:hover {
      background: #f5f8fd;
    }

    tbody tr.selected {
      background: #e8f0ff;
      outline: 2px solid rgba(31, 94, 219, 0.28);
      outline-offset: -2px;
    }

    .notes-cell {
      overflow: hidden;
      text-align: left;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tfoot td {
      position: sticky;
      bottom: 0;
      z-index: 2;
      background: #edf2ff;
      color: #0e3f9d;
      font-weight: 800;
    }

    .empty {
      height: 130px;
      color: #64748b;
      text-align: center !important;
    }

    .list-footer {
      display: flex;
      justify-content: flex-end;
      padding-top: 10px;
      color: #475569;
      font-size: 12px;
      font-weight: 700;
    }

    .notice {
      display: none;
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 7px;
      font-size: 12px;
      line-height: 1.5;
    }

    .notice.show {
      display: block;
    }

    .notice.info {
      background: #eff6ff;
      color: #1d4ed8;
    }

    .notice.success {
      background: #ecfdf5;
      color: #047857;
    }

    .notice.error {
      background: #fff1f2;
      color: #be123c;
    }

    .loading {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.42);
    }

    .loading.show {
      display: flex;
    }

    .loading-box {
      padding: 17px 22px;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.18);
      font-weight: 800;
    }

    @media (max-width: 900px) {
      .search-frame {
        grid-template-columns: 1fr 1fr;
      }

      .search-buttons {
        grid-column: 1 / -1;
      }

      .editor-grid {
        grid-template-columns: 1fr 1fr;
      }

      .action-frame {
        align-items: flex-start;
        flex-direction: column;
      }

      .action-buttons {
        width: 100%;
        justify-content: flex-start;
      }
    }

    @media (max-width: 600px) {
      .page {
        padding: 8px;
      }

      .title-area h1 {
        font-size: 19px;
      }

      .file-name {
        display: block;
        margin: 3px 0 0;
      }

      .main-button {
        min-width: 92px;
        height: 38px;
        padding: 0 10px;
        font-size: 12px;
      }

      .search-frame,
      .editor-grid {
        grid-template-columns: 1fr;
      }

      .search-buttons {
        grid-column: auto;
        justify-content: stretch;
      }

      .search-buttons .btn {
        flex: 1;
      }

      .action-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .action-buttons .btn {
        width: 100%;
      }

      .list-frame {
        padding: 10px;
      }

      table {
        min-width: 900px;
      }
    }
  </style>
</head>

<body>
<main class="page">
  <section class="title-frame">
    <div class="title-area">
      <h1>재질 관리 <span class="file-name">_system_edit_material.html</span></h1>
      <div class="subtitle">HeatPro MES · 로그인 회사의 재질 조회·등록·수정·삭제</div>
    </div>
    <button class="main-button" type="button" onclick="goMain()">⌂ 메인화면</button>
  </section>

  
<section class="search-frame">
  <div class="field"><label for="searchMaterialName">재질명</label><input id="searchMaterialName" placeholder="전체"></div>
  <div class="search-buttons"><button class="btn btn-blue" onclick="searchRows()">🔍 조회</button><button class="btn" onclick="resetSearch()">초기화</button></div>
</section>

  <section class="action-frame">
    <div id="guideText" class="guide-text">데이터를 불러오는 중입니다.</div>
    <div class="action-buttons">
      <button id="btnNew" class="btn btn-green" type="button" onclick="startNew()">＋ 등록</button>
      <button id="btnEdit" class="btn btn-blue" type="button" onclick="startEdit()" disabled>✎ 수정</button>
      <button id="btnDelete" class="btn btn-red" type="button" onclick="deleteSelected()" disabled>▣ 삭제</button>
      <button id="btnSave" class="btn btn-green" type="button" onclick="saveRecord()" disabled>▣ 저장</button>
    </div>
  </section>

  <div id="notice" class="notice" role="status" aria-live="polite"></div>

  
<section id="editorFrame" class="editor-frame"><div class="editor-head"><h2>재질정보 입력</h2><span id="modeBadge" class="mode-badge">대기</span></div>
<form id="editForm" onsubmit="return false;"><div class="editor-grid">
<div class="field"><label for="materialName">재질명 *</label><input id="materialName" maxlength="120" disabled></div>
<div class="field"><label>사용 상태</label><div class="checkbox-line"><input id="isActive" type="checkbox" checked disabled><label for="isActive">사용</label></div></div>
</div></form></section>

  
<section class="list-frame"><h2 class="list-title">재질 상세현황</h2><div class="table-wrap"><table style="min-width:650px"><thead><tr><th>NO</th><th>재질명</th><th>상태</th></tr></thead><tbody id="tableBody"><tr><td class="empty" colspan="3">데이터를 불러오는 중입니다.</td></tr></tbody><tfoot><tr><td>합계</td><td id="totalCount" colspan="2">0건</td></tr></tfoot></table></div><div id="countLabel" class="list-footer">총 0건</div></section>
</main>

<div id="loadingOverlay" class="loading">
  <div id="loadingText" class="loading-box">처리 중입니다...</div>
</div>

<script>

"use strict";
const SUPABASE_URL="https://enxtgbyslnryxvfpjdkc.supabase.co";
const SUPABASE_KEY="sb_publishable_9w9ktk0x4D8I6QodkWOthA_4FcxzMwD";
const LOGIN_PAGE_URL="../index.html";
const MAIN_PAGE_URL="main1.html";
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
let currentProfile=null,allRows=[],visibleRows=[],selectedId=null,mode="view";
function n(v){return String(v??"").trim()}
function e(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function loading(show,text="처리 중입니다..."){document.getElementById("loadingText").textContent=text;document.getElementById("loadingOverlay").classList.toggle("show",!!show)}
function notice(text,type="info"){const x=document.getElementById("notice");x.textContent=text;x.className="notice show "+type}
function clearNotice(){const x=document.getElementById("notice");x.textContent="";x.className="notice"}
function guide(t){document.getElementById("guideText").textContent=t}
function dbError(x){if(!x)return"알 수 없는 오류입니다.";if(x.code==="23505")return"같은 회사에 중복된 값이 있습니다.";if(x.code==="23503")return"다른 업무 데이터에서 사용 중이므로 삭제할 수 없습니다.";if(x.code==="42501")return"권한이 없습니다. RLS 정책을 확인해 주세요.";return x.message||String(x)}
async function auth(){
 const {data:u,error:ue}=await sb.auth.getUser(); const user=u?.user;
 if(ue||!user){location.replace(LOGIN_PAGE_URL);return false}
 const {data:p,error:pe}=await sb.from("profiles").select("company_id,is_active").eq("user_id",user.id).single();
 if(pe||!p||p.is_active!==true||!p.company_id){await sb.auth.signOut({scope:"local"});location.replace(LOGIN_PAGE_URL);return false}
 currentProfile=p;document.documentElement.classList.remove("auth-pending");return true
}
function goMain(){location.href=MAIN_PAGE_URL}
sb.auth.onAuthStateChange(ev=>{if(ev==="SIGNED_OUT")location.replace(LOGIN_PAGE_URL)});

const fields=["materialName","isActive"];
function setMode(m){mode=m;const ed=m==="new"||m==="edit";fields.forEach(id=>document.getElementById(id).disabled=!ed);btnSave.disabled=!ed;btnEdit.disabled=!selectedId||ed;btnDelete.disabled=!selectedId||ed;editorFrame.classList.toggle("show",ed||!!selectedId);modeBadge.textContent=m==="new"?"신규등록":m==="edit"?"수정중":selectedId?"선택됨":"대기";modeBadge.className="mode-badge"+(m==="new"?" new":m==="edit"?" edit":"")}
function clearForm(){selectedId=null;editForm.reset();isActive.checked=true}
function fill(r){materialName.value=r.material_name||"";isActive.checked=r.is_active!==false}
async function loadRows(){loading(true,"재질정보를 불러오는 중입니다...");clearNotice();const {data,error}=await sb.from("materials").select("material_system_id,material_name,is_active").eq("company_id",currentProfile.company_id).order("material_name");loading(false);if(error){allRows=[];visibleRows=[];render();return notice("조회 실패: "+dbError(error),"error")}allRows=data||[];apply();clearForm();setMode("view");guide("재질정보 "+allRows.length+"건을 불러왔습니다.")}
function apply(){const a=n(searchMaterialName.value).toLowerCase();visibleRows=allRows.filter(r=>!a||String(r.material_name||"").toLowerCase().includes(a));selectedId=null;render();setMode("view")}
async function searchRows(){if(!allRows.length)await loadRows();else apply();guide("조회조건에 맞는 재질 "+visibleRows.length+"건을 표시합니다.")}
function resetSearch(){searchMaterialName.value="";apply();guide("조회조건을 초기화했습니다.")}
function render(){tableBody.innerHTML=visibleRows.length?visibleRows.map((r,i)=>`<tr data-id="${e(r.material_system_id)}" onclick="selectRow('${e(r.material_system_id)}')"><td>${i+1}</td><td>${e(r.material_name)}</td><td>${r.is_active?"사용":"중지"}</td></tr>`).join(""):'<tr><td class="empty" colspan="3">표시할 재질이 없습니다.</td></tr>';totalCount.textContent=visibleRows.length+"건";countLabel.textContent="총 "+visibleRows.length+"건"}
function selectRow(id){const r=allRows.find(x=>x.material_system_id===id);if(!r)return;selectedId=id;fill(r);document.querySelectorAll("#tableBody tr").forEach(x=>x.classList.toggle("selected",x.dataset.id===id));setMode("view");guide("선택한 재질을 수정하거나 삭제할 수 있습니다.")}
function startNew(){clearForm();setMode("new");materialName.focus();guide("신규 재질정보를 입력한 후 저장 버튼을 누르세요.")}
function startEdit(){if(!selectedId)return notice("수정할 재질을 선택해 주세요.","error");setMode("edit");guide("수정할 내용을 입력한 후 저장 버튼을 누르세요.")}
async function saveRecord(){if(mode!=="new"&&mode!=="edit")return notice("등록 또는 수정 버튼을 먼저 눌러 주세요.","error");const p={company_id:currentProfile.company_id,material_name:n(materialName.value),is_active:isActive.checked};if(!p.material_name)return notice("재질명을 입력해 주세요.","error");loading(true,"저장 중입니다...");const res=mode==="new"?await sb.from("materials").insert(p):await sb.from("materials").update(p).eq("material_system_id",selectedId).eq("company_id",currentProfile.company_id);loading(false);if(res.error)return notice("저장 실패: "+dbError(res.error),"error");notice("재질정보가 저장되었습니다.","success");await loadRows()}
async function deleteSelected(){if(!selectedId)return notice("삭제할 재질을 선택해 주세요.","error");if(!confirm("선택한 재질을 삭제하시겠습니까?"))return;loading(true,"삭제 중입니다...");const {error}=await sb.from("materials").delete().eq("material_system_id",selectedId).eq("company_id",currentProfile.company_id);loading(false);if(error)return notice("삭제 실패: "+dbError(error),"error");notice("재질정보가 삭제되었습니다.","success");await loadRows()}
async function init(){try{if(await auth()){setMode("view");await loadRows()}}catch(x){document.documentElement.classList.remove("auth-pending");notice("화면 초기화 오류: "+dbError(x),"error")}}
addEventListener("load",init);

</script>
</body>
</html>
