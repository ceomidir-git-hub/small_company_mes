<!DOCTYPE html>
<html lang="ko" class="auth-pending">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재질 관리 | HeatPro MES</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

:root{
  --bg:#f3f6fa;
  --card:#ffffff;
  --line:#d8e0ea;
  --text:#18212f;
  --muted:#64748b;
  --primary:#1f5eff;
  --primary-dark:#1747bf;
  --danger:#dc2626;
  --success:#059669;
  --warning:#b45309;
  --shadow:0 12px 34px rgba(15,23,42,.08);
  --radius:16px;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:"Noto Sans KR","Malgun Gothic",system-ui,sans-serif;background:var(--bg);color:var(--text)}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
button:disabled{cursor:not-allowed;opacity:.48}
.auth-pending body{visibility:hidden}
.page{width:min(1240px,100%);margin:0 auto;padding:14px}
.topbar{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:#152238;color:#fff;border-radius:14px;padding:13px 15px;margin-bottom:12px;
  box-shadow:var(--shadow)
}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.brand-mark{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;background:#ff6b35;font-size:19px;flex:0 0 auto}
.brand h1{font-size:18px;margin:0;letter-spacing:-.3px}
.brand p{font-size:11px;margin:2px 0 0;color:#b8c4d6}
.top-actions{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}
.top-btn{
  min-height:36px;padding:7px 11px;border:1px solid #40506a;border-radius:9px;
  background:#22324b;color:#fff;font-size:12px
}
.top-btn:hover{border-color:#ff8a5c}
.layout{display:grid;grid-template-columns:minmax(0,390px) minmax(0,1fr);gap:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px}
.card-title{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:13px}
.card-title h2{font-size:18px;margin:0}
.card-title p{font-size:12px;color:var(--muted);margin:3px 0 0;line-height:1.45}
.mode-badge{flex:0 0 auto;padding:5px 9px;border-radius:999px;background:#e8eef8;color:#34445e;font-size:11px;font-weight:700}
.mode-badge.new{background:#e6f7ef;color:#047857}
.mode-badge.edit{background:#fff1db;color:#9a4d00}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
.field label{font-size:12px;color:#40506a;font-weight:700}
.field input,.field select,.field textarea{
  width:100%;min-height:42px;border:1px solid #cbd5e1;border-radius:9px;background:#fff;
  color:var(--text);padding:9px 10px;outline:none
}
.field textarea{min-height:78px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(31,94,255,.12)}
.field input:disabled,.field select:disabled,.field textarea:disabled{background:#f1f5f9;color:#64748b}
.checkbox-line{min-height:42px;display:flex;align-items:center;gap:8px;border:1px solid #cbd5e1;border-radius:9px;padding:8px 10px}
.checkbox-line input{width:18px;height:18px;min-height:auto}
.button-row{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:14px}
.action-btn{min-height:42px;border:1px solid #cbd5e1;border-radius:9px;background:#fff;color:#263449;font-weight:800;font-size:13px}
.action-btn:hover{background:#f8fafc}
.action-btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
.action-btn.primary:hover{background:var(--primary-dark)}
.action-btn.danger{background:#fff1f2;border-color:#fecdd3;color:var(--danger)}
.action-btn.edit{background:#fff7ed;border-color:#fed7aa;color:#9a4d00}
.notice{display:none;margin-top:11px;padding:9px 11px;border-radius:9px;font-size:12px;line-height:1.5}
.notice.show{display:block}
.notice.info{background:#eff6ff;color:#1e40af}
.notice.success{background:#ecfdf5;color:#047857}
.notice.error{background:#fff1f2;color:#b91c1c}
.list-tools{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.search{flex:1;min-height:40px;border:1px solid #cbd5e1;border-radius:9px;padding:8px 10px}
.refresh-btn{min-height:40px;padding:7px 12px;border:1px solid #cbd5e1;border-radius:9px;background:#fff;font-weight:700}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:11px;max-height:650px}
table{width:100%;border-collapse:collapse;min-width:700px;font-size:12px}
thead th{position:sticky;top:0;z-index:2;background:#eef3f9;color:#34445e;border-bottom:1px solid var(--line);padding:9px 8px;text-align:center;white-space:nowrap}
tbody td{border-bottom:1px solid #e8edf3;padding:8px;text-align:center;white-space:nowrap}
tbody tr{cursor:pointer}
tbody tr:hover{background:#f5f8fc}
tbody tr.selected{background:#eaf1ff;outline:2px solid rgba(31,94,255,.28);outline-offset:-2px}
.empty{padding:35px 12px!important;color:var(--muted);text-align:center!important}
.count{font-size:12px;color:var(--muted);margin-top:8px;text-align:right}
.loading{
  display:none;position:fixed;inset:0;z-index:9999;background:rgba(15,23,42,.45);
  align-items:center;justify-content:center;padding:20px
}
.loading.show{display:flex}
.loading-box{background:#fff;border-radius:14px;padding:17px 22px;box-shadow:var(--shadow);font-weight:800}
@media(max-width:900px){
  .layout{grid-template-columns:1fr}
  .table-wrap{max-height:none}
}
@media(max-width:600px){
  .page{padding:8px}
  .topbar{border-radius:10px;padding:11px}
  .brand h1{font-size:15px}
  .brand p{display:none}
  .top-actions{gap:5px}
  .top-btn{padding:6px 8px;font-size:11px}
  .card{border-radius:12px;padding:12px}
  .form-grid{grid-template-columns:1fr}
  .field.full{grid-column:auto}
  .button-row{grid-template-columns:1fr 1fr}
  table{min-width:650px}
}


</style>
</head>
<body>
<div class="page">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">🛠</div>
      <div>
        <h1>재질 관리</h1>
        <p>로그인 회사의 재질만 등록·수정·삭제합니다.</p>
      </div>
    </div>
    <div class="top-actions">
      <button class="top-btn" type="button" onclick="goMain()">메인화면</button>
      <button class="top-btn" type="button" onclick="logout()">로그아웃</button>
    </div>
  </header>

  <section class="layout">
    <article class="card">
      <div class="card-title">
        <div>
          <h2>입력 화면</h2>
          <p>등록 버튼으로 신규 입력을 시작하고, 목록 선택 후 수정 버튼을 누르세요.</p>
        </div>
        <span id="modeBadge" class="mode-badge">대기</span>
      </div>

      <form id="editForm" onsubmit="return false;">
        
<div class="form-grid">
  <div class="field full">
    <label for="materialName">재질명 *</label>
    <input id="materialName" maxlength="120" autocomplete="off" disabled>
  </div>
  <div class="field full">
    <label>사용 상태</label>
    <div class="checkbox-line">
      <input id="isActive" type="checkbox" checked disabled>
      <label for="isActive">사용</label>
    </div>
  </div>
</div>

      </form>

      <div class="button-row">
        <button id="btnNew" class="action-btn primary" type="button" onclick="startNew()">등록</button>
        <button id="btnEdit" class="action-btn edit" type="button" onclick="startEdit()" disabled>수정</button>
        <button id="btnDelete" class="action-btn danger" type="button" onclick="deleteSelected()" disabled>삭제</button>
        <button id="btnSave" class="action-btn" type="button" onclick="saveRecord()" disabled>저장</button>
      </div>

      <div id="notice" class="notice" role="status" aria-live="polite"></div>
    </article>

    <article class="card">
      <div class="card-title">
        <div>
          <h2>등록 목록</h2>
          <p>로그인 계정에 허용된 데이터만 표시됩니다.</p>
        </div>
        <span id="userLabel" class="mode-badge">관리자</span>
      </div>

      <div class="list-tools">
        <input id="searchInput" class="search" type="search" placeholder="목록 검색" oninput="renderRows()">
        <button class="refresh-btn" type="button" onclick="loadRows()">새로고침</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead><tr><th>NO</th><th>재질명</th><th>상태</th></tr></thead>
          <tbody id="tableBody">
            <tr><td class="empty" colspan="10">데이터를 불러오는 중입니다.</td></tr>
          </tbody>
        </table>
      </div>
      <div id="countLabel" class="count">0건</div>
    </article>
  </section>
</div>

<div id="loadingOverlay" class="loading">
  <div id="loadingText" class="loading-box">처리 중입니다...</div>
</div>

<script>
"use strict";

const SUPABASE_URL = "https://enxtgbyslnryxvfpjdkc.supabase.co";
const SUPABASE_KEY = "sb_publishable_9w9ktk0x4D8I6QodkWOthA_4FcxzMwD";
const QGIS_COMPANY_ID = "17f2ff71-20db-49ff-b682-279989776817";
const LOGIN_PAGE_URL = "../index.html";
const MAIN_PAGE_URL = "main1.html";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true
  }
});

let currentUser = null;
let currentProfile = null;

function showLoading(show, text = "처리 중입니다...") {
  const overlay = document.getElementById("loadingOverlay");
  const label = document.getElementById("loadingText");
  if (label) label.textContent = text;
  if (overlay) overlay.classList.toggle("show", Boolean(show));
}

function showNotice(text, type = "info") {
  const box = document.getElementById("notice");
  if (!box) return;
  box.textContent = text;
  box.className = "notice show " + type;
}

function clearNotice() {
  const box = document.getElementById("notice");
  if (!box) return;
  box.textContent = "";
  box.className = "notice";
}

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, ch => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  })[ch]);
}

function normalizeText(value) {
  return String(value ?? "").trim();
}

function formatDbError(error) {
  if (!error) return "알 수 없는 오류입니다.";
  if (error.code === "23505") return "같은 관리번호 또는 같은 데이터가 이미 등록되어 있습니다.";
  if (error.code === "23503") return "다른 데이터에서 사용 중이므로 삭제하거나 변경할 수 없습니다.";
  if (error.code === "42501") return "이 작업에 대한 Supabase 권한이 없습니다. RLS 정책을 확인해 주세요.";
  return error.message || String(error);
}

async function verifyQgisAccess(extraColumns = "") {
  const { data: userData, error: userError } = await sb.auth.getUser();
  const user = userData?.user;

  if (userError || !user) {
    window.location.replace(LOGIN_PAGE_URL);
    return null;
  }

  const columns = "company_id,is_active" + (extraColumns ? "," + extraColumns : "");
  const { data: profile, error: profileError } = await sb
    .from("profiles")
    .select(columns)
    .eq("user_id", user.id)
    .single();

  if (
    profileError ||
    !profile ||
    profile.is_active !== true ||
    profile.company_id !== QGIS_COMPANY_ID
  ) {
    console.error("QGIS 권한 확인 실패:", profileError);
    await sb.auth.signOut({ scope: "local" });
    window.location.replace(LOGIN_PAGE_URL);
    return null;
  }

  currentUser = user;
  currentProfile = profile;

  const userLabel = document.getElementById("userLabel");
  if (userLabel) userLabel.textContent = user.email || "관리자";

  document.documentElement.classList.remove("auth-pending");
  return { user, profile };
}

async function logout() {
  await sb.auth.signOut({ scope: "local" });
  window.location.replace(LOGIN_PAGE_URL);
}

function goMain() {
  window.location.href = MAIN_PAGE_URL;
}

sb.auth.onAuthStateChange(event => {
  if (event === "SIGNED_OUT") window.location.replace(LOGIN_PAGE_URL);
});


let rows = [];
let selectedId = null;
let mode = "view";

function setMode(nextMode) {
  mode = nextMode;
  const editing = mode === "new" || mode === "edit";
  document.getElementById("materialName").disabled = !editing;
  document.getElementById("isActive").disabled = !editing;
  document.getElementById("btnSave").disabled = !editing;
  document.getElementById("btnEdit").disabled = !selectedId || editing;
  document.getElementById("btnDelete").disabled = !selectedId || editing;

  const badge = document.getElementById("modeBadge");
  badge.className = "mode-badge" + (mode === "new" ? " new" : mode === "edit" ? " edit" : "");
  badge.textContent = mode === "new" ? "신규등록" : mode === "edit" ? "수정중" : selectedId ? "선택됨" : "대기";
}

function clearForm() {
  selectedId = null;
  document.getElementById("editForm").reset();
  document.getElementById("isActive").checked = true;
  document.querySelectorAll("#tableBody tr").forEach(tr => tr.classList.remove("selected"));
}

function startNew() {
  clearNotice(); clearForm(); setMode("new");
  document.getElementById("materialName").focus();
}

function startEdit() {
  if (!selectedId) return showNotice("수정할 재질을 선택해 주세요.", "error");
  clearNotice(); setMode("edit");
  document.getElementById("materialName").focus();
}

async function loadRows() {
  showLoading(true, "재질 목록을 불러오는 중입니다...");
  const { data, error } = await sb
    .from("materials")
    .select("material_system_id,material_name,is_active")
    .eq("company_id", currentProfile.company_id)
    .order("material_name", { ascending: true });
  showLoading(false);

  if (error) {
    rows = []; renderRows();
    return showNotice("조회 실패: " + formatDbError(error), "error");
  }

  rows = data || [];
  selectedId = null; setMode("view"); renderRows();
}

function renderRows() {
  const q = normalizeText(document.getElementById("searchInput").value).toLowerCase();
  const filtered = rows.filter(row => String(row.material_name || "").toLowerCase().includes(q));
  const body = document.getElementById("tableBody");

  body.innerHTML = filtered.length ? filtered.map((row,index) => `
    <tr data-id="${escapeHtml(row.material_system_id)}" onclick="selectRow('${escapeHtml(row.material_system_id)}')">
      <td>${index+1}</td>
      <td>${escapeHtml(row.material_name)}</td>
      <td>${row.is_active ? "사용" : "중지"}</td>
    </tr>
  `).join("") : '<tr><td class="empty" colspan="3">표시할 재질이 없습니다.</td></tr>';

  document.getElementById("countLabel").textContent = filtered.length + "건";
}

function selectRow(id) {
  const row = rows.find(item => item.material_system_id === id);
  if (!row) return;
  selectedId = id;
  document.getElementById("materialName").value = row.material_name || "";
  document.getElementById("isActive").checked = row.is_active !== false;
  document.querySelectorAll("#tableBody tr").forEach(tr =>
    tr.classList.toggle("selected", tr.dataset.id === id)
  );
  clearNotice(); setMode("view");
}

async function saveRecord() {
  if (mode !== "new" && mode !== "edit") return showNotice("등록 또는 수정 버튼을 먼저 눌러 주세요.", "error");

  const payload = {
    company_id: currentProfile.company_id,
    material_name: normalizeText(document.getElementById("materialName").value),
    is_active: document.getElementById("isActive").checked
  };

  if (!payload.material_name) return showNotice("재질명을 입력해 주세요.", "error");

  showLoading(true, "재질 정보를 저장하는 중입니다...");
  let result;
  if (mode === "new") {
    result = await sb.from("materials").insert(payload);
  } else {
    result = await sb.from("materials").update(payload)
      .eq("material_system_id", selectedId)
      .eq("company_id", currentProfile.company_id);
  }
  showLoading(false);

  if (result.error) return showNotice("저장 실패: " + formatDbError(result.error), "error");

  showNotice(mode === "new" ? "재질이 등록되었습니다." : "재질 정보가 수정되었습니다.", "success");
  clearForm(); setMode("view"); await loadRows();
}

async function deleteSelected() {
  if (!selectedId) return showNotice("삭제할 재질을 선택해 주세요.", "error");
  const row = rows.find(item => item.material_system_id === selectedId);
  if (!confirm(`${row?.material_name || "선택한 재질"}을 삭제하시겠습니까?\n업무 데이터에서 사용 중이면 삭제되지 않습니다.`)) return;

  showLoading(true, "재질을 삭제하는 중입니다...");
  const { error } = await sb.from("materials").delete()
    .eq("material_system_id", selectedId)
    .eq("company_id", currentProfile.company_id);
  showLoading(false);

  if (error) return showNotice("삭제 실패: " + formatDbError(error), "error");

  showNotice("재질이 삭제되었습니다.", "success");
  clearForm(); setMode("view"); await loadRows();
}

async function initializePage() {
  const access = await verifyQgisAccess();
  if (!access) return;
  await loadRows();
}

window.addEventListener("load", initializePage);

</script>
</body>
</html>
