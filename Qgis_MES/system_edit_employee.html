<!DOCTYPE html>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f4f6f9;--card:#fff;--line:#cfd6e1;--text:#1f2937;--muted:#64748b;--blue:#1f5edb;--green:#079660;--red:#dc2f45;--shadow:0 3px 12px rgba(15,23,42,.06);--radius:9px}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:"Malgun Gothic","Apple SD Gothic Neo",Arial,sans-serif;background:var(--bg);color:var(--text)}html.auth-pending body{visibility:hidden}button,input,select,textarea{font:inherit}button{cursor:pointer}button:disabled{cursor:not-allowed;opacity:.48}.page{width:100%;padding:12px}.title-frame{display:flex;justify-content:space-between;gap:16px;margin-bottom:12px}.title-area h1{margin:0;color:#0e3f9d;font-size:24px}.file-name{margin-left:5px;color:#667085;font-size:12px;font-weight:400}.subtitle{margin-top:5px;color:#5f6b7a;font-size:12px}.main-button{min-width:112px;height:42px;padding:0 16px;border:1px solid var(--line);border-radius:8px;background:#fff;font-weight:700;box-shadow:var(--shadow)}.search-frame{display:grid;grid-template-columns:180px 180px minmax(180px,1fr) auto;align-items:end;gap:12px;padding:16px;border:1px solid var(--line);border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow)}.field{display:flex;flex-direction:column;gap:6px;min-width:0}.field label{color:#445267;font-size:12px;font-weight:700}.field input,.field textarea{width:100%;min-height:40px;padding:8px 10px;border:1px solid #c7d0dc;border-radius:7px;background:#fff;outline:none}.field textarea{min-height:82px;resize:vertical}.search-buttons,.action-buttons{display:flex;gap:9px;flex-wrap:wrap;justify-content:flex-end}.btn{min-height:40px;padding:8px 16px;border:1px solid var(--line);border-radius:7px;background:#fff;font-size:13px;font-weight:800;white-space:nowrap}.btn-blue{border-color:var(--blue);background:var(--blue);color:#fff}.btn-green{border-color:var(--green);background:var(--green);color:#fff}.btn-red{border-color:var(--red);background:var(--red);color:#fff}.action-frame{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 0}.guide-text{color:#617087;font-size:12px}.notice{display:none;margin-bottom:12px;padding:10px 12px;border-radius:7px;font-size:12px}.notice.show{display:block}.notice.success{background:#ecfdf5;color:#047857}.notice.error{background:#fff1f2;color:#be123c}.notice.info{background:#eff6ff;color:#1d4ed8}.editor-frame{display:none;margin-bottom:12px;padding:15px;border:1px solid var(--line);border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow)}.editor-frame.show{display:block}.editor-head{display:flex;justify-content:space-between;gap:10px;margin-bottom:12px}.editor-head h2{margin:0;color:#0e3f9d;font-size:17px}.mode-badge{padding:5px 10px;border-radius:999px;background:#e9eef7;color:#45556d;font-size:11px;font-weight:800}.mode-badge.new{background:#e6f7ef;color:#047857}.mode-badge.edit{background:#fff3df;color:#a35405}.editor-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.full{grid-column:1/-1}.check-line{min-height:40px;display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid #c7d0dc;border-radius:7px}.check-line input{width:18px;height:18px;min-height:auto}.char-count{margin-top:4px;color:#64748b;font-size:11px;text-align:right}.list-frame{padding:14px 16px 16px;border:1px solid var(--line);border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow)}.list-title{margin:2px 0 12px;color:#0e3f9d;font-size:18px;text-align:center}.table-wrap{width:100%;max-height:560px;overflow:auto;border:1px solid #cbd5e1;background:#fff}table{width:100%;min-width:1450px;border-collapse:collapse;font-size:12px}thead th{position:sticky;top:0;z-index:3;padding:10px 8px;border-right:1px solid #1248a9;border-bottom:1px solid #1248a9;background:#1e5bd7;color:#fff;white-space:nowrap}tbody td,tfoot td{padding:9px 8px;border-right:1px solid #d8dee8;border-bottom:1px solid #d8dee8;text-align:center;white-space:nowrap}tbody tr{cursor:pointer}tbody tr:hover{background:#f5f8fd}tbody tr.selected{background:#e8f0ff;outline:2px solid rgba(31,94,219,.28);outline-offset:-2px}.text-left{text-align:left!important;max-width:280px;overflow:hidden;text-overflow:ellipsis}tfoot td{position:sticky;bottom:0;z-index:2;background:#edf2ff;color:#0e3f9d;font-weight:800}.empty{height:130px;color:#64748b;text-align:center!important}.list-footer{display:flex;justify-content:flex-end;padding-top:10px;color:#475569;font-size:12px;font-weight:700}.loading{display:none;position:fixed;inset:0;z-index:9999;align-items:center;justify-content:center;background:rgba(15,23,42,.42)}.loading.show{display:flex}.loading-box{padding:17px 22px;border-radius:12px;background:#fff;box-shadow:0 10px 30px rgba(15,23,42,.18);font-weight:800}@media(max-width:950px){.search-frame{grid-template-columns:1fr 1fr}.search-buttons{grid-column:1/-1}.editor-grid{grid-template-columns:1fr 1fr}.action-frame{align-items:flex-start;flex-direction:column}}@media(max-width:600px){.page{padding:8px}.title-area h1{font-size:19px}.file-name{display:block;margin:3px 0 0}.main-button{min-width:92px;height:38px;padding:0 10px;font-size:12px}.search-frame,.editor-grid{grid-template-columns:1fr}.search-buttons{grid-column:auto}.action-buttons{display:grid;grid-template-columns:1fr 1fr;width:100%}.action-buttons .btn{width:100%}.list-frame{padding:10px}}
</style>
</head>
<body>
<main class="page">
<section class="title-frame"><div class="title-area"><h1>사원 관리 <span class="file-name">_system_edit_employee.html</span></h1><div class="subtitle">HeatPro MES · 로그인 회사의 사원정보 조회·등록·수정·삭제</div></div><button class="main-button" type="button" onclick="goMain()">⌂ 메인화면</button></section>
<section class="search-frame"><div class="field"><label for="searchEmployeeCode">사원코드</label><input id="searchEmployeeCode" maxlength="30" placeholder="전체"></div><div class="field"><label for="searchEmployeeName">이름</label><input id="searchEmployeeName" maxlength="100" placeholder="전체"></div><div class="field"><label for="searchDepartment">부서명</label><input id="searchDepartment" maxlength="150" placeholder="전체"></div><div class="search-buttons"><button class="btn btn-blue" type="button" onclick="searchRows()">🔍 조회</button><button class="btn" type="button" onclick="resetSearch()">초기화</button></div></section>
<section class="action-frame"><div id="guideText" class="guide-text">조회 버튼을 눌러 사원정보를 불러오세요.</div><div class="action-buttons"><button id="btnNew" class="btn btn-green" type="button" onclick="startNew()">＋ 등록</button><button id="btnEdit" class="btn btn-blue" type="button" onclick="startEdit()" disabled>✎ 수정</button><button id="btnDelete" class="btn btn-red" type="button" onclick="deleteSelected()" disabled>▣ 삭제</button><button id="btnSave" class="btn btn-green" type="button" onclick="saveRecord()" disabled>▣ 저장</button></div></section>
<div id="notice" class="notice" role="status" aria-live="polite"></div>
<section id="editorFrame" class="editor-frame"><div class="editor-head"><h2>사원정보 입력</h2><span id="modeBadge" class="mode-badge">대기</span></div><form id="employeeForm" onsubmit="return false;"><div class="editor-grid">
<div class="field"><label for="employeeCode">사원코드 *</label><input id="employeeCode" maxlength="30" disabled></div><div class="field"><label for="positionName">직위</label><input id="positionName" maxlength="100" disabled></div><div class="field"><label for="employeeName">이름</label><input id="employeeName" maxlength="100" disabled></div><div class="field"><label for="departmentName">부서명</label><input id="departmentName" maxlength="150" disabled></div><div class="field"><label for="phone">폰번호</label><input id="phone" type="tel" maxlength="50" disabled></div><div class="field"><label for="birthDate">생년월일</label><input id="birthDate" type="date" disabled></div><div class="field"><label for="hireDate">입사일</label><input id="hireDate" type="date" disabled></div><div class="field"><label for="terminationDate">퇴사일</label><input id="terminationDate" type="date" disabled></div><div class="field"><label for="nationality">국적</label><input id="nationality" maxlength="100" disabled></div><div class="field"><label>사용 상태</label><div class="check-line"><input id="isActive" type="checkbox" checked disabled><label for="isActive">사용</label></div></div><div class="field full"><label for="address">주소</label><textarea id="address" maxlength="300" disabled></textarea></div><div class="field full"><label for="specialNotes">특이사항</label><textarea id="specialNotes" maxlength="500" disabled oninput="updateCharCount()"></textarea><div id="charCount" class="char-count">0 / 500자</div></div>
</div></form></section>
<section class="list-frame"><h2 class="list-title">사원정보 상세현황</h2><div class="table-wrap"><table><thead><tr><th>NO</th><th>사원코드</th><th>직위</th><th>이름</th><th>부서명</th><th>폰번호</th><th>생년월일</th><th>주소</th><th>입사일</th><th>퇴사일</th><th>국적</th><th>특이사항</th><th>상태</th></tr></thead><tbody id="tableBody"><tr><td class="empty" colspan="13">조회 버튼을 눌러 데이터를 불러오세요.</td></tr></tbody><tfoot><tr><td colspan="4">합계</td><td id="totalCount" colspan="9">0건</td></tr></tfoot></table></div><div id="countLabel" class="list-footer">총 0건</div></section>
</main>
<div id="loadingOverlay" class="loading"><div id="loadingText" class="loading-box">처리 중입니다...</div></div>
<script>
"use strict";
const SUPABASE_URL="https://enxtgbyslnryxvfpjdkc.supabase.co";const SUPABASE_KEY="sb_publishable_9w9ktk0x4D8I6QodkWOthA_4FcxzMwD";const LOGIN_PAGE_URL="../index.html";const MAIN_PAGE_URL="main1.html";const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
let currentProfile=null,allRows=[],visibleRows=[],selectedId=null,mode="view";const editableIds=["employeeCode","positionName","employeeName","departmentName","phone","birthDate","address","hireDate","terminationDate","nationality","specialNotes","isActive"];
function normalizeText(v){return String(v??"").trim()}function escapeHtml(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}function showLoading(show,text="처리 중입니다..."){document.getElementById("loadingText").textContent=text;document.getElementById("loadingOverlay").classList.toggle("show",!!show)}function showNotice(text,type="info"){const n=document.getElementById("notice");n.textContent=text;n.className="notice show "+type}function clearNotice(){const n=document.getElementById("notice");n.textContent="";n.className="notice"}function formatDbError(e){if(!e)return"알 수 없는 오류입니다.";if(e.code==="23505")return"같은 사원코드가 이미 등록되어 있습니다.";if(e.code==="23503")return"다른 업무 데이터에서 사용 중이므로 삭제할 수 없습니다.";if(e.code==="23514")return"입사일·퇴사일 또는 특이사항을 확인해 주세요.";if(e.code==="42501")return"이 작업에 대한 권한이 없습니다.";return e.message||String(e)}function updateCharCount(){document.getElementById("charCount").textContent=document.getElementById("specialNotes").value.length+" / 500자"}function updateGuide(t){document.getElementById("guideText").textContent=t}
async function verifyCompanyAccess(){const {data:userData,error:userError}=await sb.auth.getUser();const user=userData?.user;if(userError||!user){window.location.replace(LOGIN_PAGE_URL);return false}const {data:profile,error:profileError}=await sb.from("profiles").select("company_id,is_active").eq("user_id",user.id).single();if(profileError||!profile||profile.is_active!==true||!profile.company_id){await sb.auth.signOut({scope:"local"});window.location.replace(LOGIN_PAGE_URL);return false}currentProfile=profile;document.documentElement.classList.remove("auth-pending");return true}
function setMode(nextMode){mode=nextMode;const editing=mode==="new"||mode==="edit";editableIds.forEach(id=>document.getElementById(id).disabled=!editing);document.getElementById("btnSave").disabled=!editing;document.getElementById("btnEdit").disabled=!selectedId||editing;document.getElementById("btnDelete").disabled=!selectedId||editing;document.getElementById("editorFrame").classList.toggle("show",editing||!!selectedId);const b=document.getElementById("modeBadge");b.className="mode-badge"+(mode==="new"?" new":mode==="edit"?" edit":"");b.textContent=mode==="new"?"신규등록":mode==="edit"?"수정중":selectedId?"선택됨":"대기"}
function clearForm(){selectedId=null;document.getElementById("employeeForm").reset();document.getElementById("isActive").checked=true;updateCharCount();document.querySelectorAll("#tableBody tr").forEach(tr=>tr.classList.remove("selected"))}
function fillForm(r){document.getElementById("employeeCode").value=r.employee_code||"";document.getElementById("positionName").value=r.position_name||"";document.getElementById("employeeName").value=r.employee_name||"";document.getElementById("departmentName").value=r.department_name||"";document.getElementById("phone").value=r.phone||"";document.getElementById("birthDate").value=r.birth_date||"";document.getElementById("address").value=r.address||"";document.getElementById("hireDate").value=r.hire_date||"";document.getElementById("terminationDate").value=r.termination_date||"";document.getElementById("nationality").value=r.nationality||"";document.getElementById("specialNotes").value=r.special_notes||"";document.getElementById("isActive").checked=r.is_active!==false;updateCharCount()}
async function loadRows(){showLoading(true,"사원정보를 불러오는 중입니다...");clearNotice();const {data,error}=await sb.from("employees").select("employee_system_id,employee_code,position_name,employee_name,department_name,phone,birth_date,address,hire_date,termination_date,nationality,special_notes,is_active").eq("company_id",currentProfile.company_id).order("employee_code",{ascending:true});showLoading(false);if(error){allRows=[];visibleRows=[];renderRows();showNotice("조회 실패: "+formatDbError(error),"error");return}allRows=data||[];applySearch();clearForm();setMode("view");updateGuide("사원정보 "+allRows.length+"건을 불러왔습니다.")}
function applySearch(){const code=normalizeText(document.getElementById("searchEmployeeCode").value).toLowerCase();const name=normalizeText(document.getElementById("searchEmployeeName").value).toLowerCase();const dept=normalizeText(document.getElementById("searchDepartment").value).toLowerCase();visibleRows=allRows.filter(r=>(!code||String(r.employee_code||"").toLowerCase().includes(code))&&(!name||String(r.employee_name||"").toLowerCase().includes(name))&&(!dept||String(r.department_name||"").toLowerCase().includes(dept)));selectedId=null;renderRows();setMode("view")}
async function searchRows(){if(!allRows.length)await loadRows();else applySearch();updateGuide("조회조건에 맞는 사원정보 "+visibleRows.length+"건을 표시합니다.")}function resetSearch(){document.getElementById("searchEmployeeCode").value="";document.getElementById("searchEmployeeName").value="";document.getElementById("searchDepartment").value="";applySearch();updateGuide("조회조건을 초기화했습니다.")}
function renderRows(){const body=document.getElementById("tableBody");body.innerHTML=visibleRows.length?visibleRows.map((r,i)=>`<tr data-id="${escapeHtml(r.employee_system_id)}" onclick="selectRow('${escapeHtml(r.employee_system_id)}')"><td>${i+1}</td><td>${escapeHtml(r.employee_code)}</td><td>${escapeHtml(r.position_name)}</td><td>${escapeHtml(r.employee_name)}</td><td>${escapeHtml(r.department_name)}</td><td>${escapeHtml(r.phone)}</td><td>${escapeHtml(r.birth_date)}</td><td class="text-left" title="${escapeHtml(r.address)}">${escapeHtml(r.address)}</td><td>${escapeHtml(r.hire_date)}</td><td>${escapeHtml(r.termination_date)}</td><td>${escapeHtml(r.nationality)}</td><td class="text-left" title="${escapeHtml(r.special_notes)}">${escapeHtml(r.special_notes)}</td><td>${r.is_active?"사용":"중지"}</td></tr>`).join(""):'<tr><td class="empty" colspan="13">표시할 사원정보가 없습니다.</td></tr>';document.getElementById("totalCount").textContent=visibleRows.length+"건";document.getElementById("countLabel").textContent="총 "+visibleRows.length+"건"}
function selectRow(id){const r=allRows.find(x=>x.employee_system_id===id);if(!r)return;selectedId=id;fillForm(r);document.querySelectorAll("#tableBody tr").forEach(tr=>tr.classList.toggle("selected",tr.dataset.id===id));clearNotice();setMode("view");updateGuide("선택한 사원정보를 수정하거나 삭제할 수 있습니다.")}
function startNew(){clearNotice();clearForm();setMode("new");updateGuide("신규 사원정보를 입력한 후 저장 버튼을 누르세요.");document.getElementById("employeeCode").focus()}function startEdit(){if(!selectedId)return showNotice("수정할 사원을 목록에서 선택해 주세요.","error");clearNotice();setMode("edit");updateGuide("수정할 내용을 입력한 후 저장 버튼을 누르세요.")}
async function saveRecord(){if(mode!=="new"&&mode!=="edit")return showNotice("등록 또는 수정 버튼을 먼저 눌러 주세요.","error");const hireDate=document.getElementById("hireDate").value||null;const terminationDate=document.getElementById("terminationDate").value||null;const specialNotes=normalizeText(document.getElementById("specialNotes").value)||null;const payload={company_id:currentProfile.company_id,employee_code:normalizeText(document.getElementById("employeeCode").value).toUpperCase(),position_name:normalizeText(document.getElementById("positionName").value)||null,employee_name:normalizeText(document.getElementById("employeeName").value)||null,department_name:normalizeText(document.getElementById("departmentName").value)||null,phone:normalizeText(document.getElementById("phone").value)||null,birth_date:document.getElementById("birthDate").value||null,address:normalizeText(document.getElementById("address").value)||null,hire_date:hireDate,termination_date:terminationDate,nationality:normalizeText(document.getElementById("nationality").value)||null,special_notes:specialNotes,is_active:document.getElementById("isActive").checked};if(!payload.employee_code)return showNotice("사원코드를 입력해 주세요.","error");if(hireDate&&terminationDate&&terminationDate<hireDate)return showNotice("퇴사일은 입사일보다 빠를 수 없습니다.","error");if(specialNotes&&specialNotes.length>500)return showNotice("특이사항은 500자 이하로 입력해 주세요.","error");showLoading(true,"사원정보를 Supabase에 저장하는 중입니다...");const result=mode==="new"?await sb.from("employees").insert(payload):await sb.from("employees").update(payload).eq("employee_system_id",selectedId).eq("company_id",currentProfile.company_id);showLoading(false);if(result.error)return showNotice("저장 실패: "+formatDbError(result.error),"error");showNotice(mode==="new"?"사원정보가 등록되었습니다.":"사원정보가 수정되었습니다.","success");await loadRows()}
async function deleteSelected(){if(!selectedId)return showNotice("삭제할 사원을 목록에서 선택해 주세요.","error");const r=allRows.find(x=>x.employee_system_id===selectedId);if(!confirm((r?.employee_code||"선택한 사원")+" 사원정보를 삭제하시겠습니까?"))return;showLoading(true,"사원정보를 삭제하는 중입니다...");const {error}=await sb.from("employees").delete().eq("employee_system_id",selectedId).eq("company_id",currentProfile.company_id);showLoading(false);if(error)return showNotice("삭제 실패: "+formatDbError(error),"error");showNotice("사원정보가 삭제되었습니다.","success");await loadRows()}
function goMain(){window.location.href=MAIN_PAGE_URL}sb.auth.onAuthStateChange(event=>{if(event==="SIGNED_OUT")window.location.replace(LOGIN_PAGE_URL)});async function initializePage(){try{const ok=await verifyCompanyAccess();if(!ok)return;setMode("view");await loadRows()}catch(e){document.documentElement.classList.remove("auth-pending");showNotice("화면 초기화 오류: "+formatDbError(e),"error")}}window.addEventListener("load",initializePage);
</script>
</body>
</html>
