<!DOCTYPE html>
<html lang="ko" class="auth-pending">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회사 관리 | HeatPro MES</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #f4f6f9;
      --card: #ffffff;
      --line: #cfd6e1;
      --line-soft: #e3e8ef;
      --text: #1f2937;
      --muted: #64748b;
      --blue: #1f5edb;
      --blue-dark: #1647ad;
      --green: #079660;
      --green-dark: #05784d;
      --red: #dc2f45;
      --red-dark: #b91f34;
      --orange: #e38b20;
      --shadow: 0 3px 12px rgba(15, 23, 42, 0.06);
      --radius: 9px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    html.auth-pending body {
      visibility: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .page {
      width: 100%;
      margin: 0 auto;
      padding: 12px;
    }

    /* 상단 제목 / 메인화면 프레임 */
    .title-frame {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .title-area h1 {
      margin: 0;
      color: #0e3f9d;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: -0.5px;
    }

    .file-name {
      margin-left: 5px;
      color: #667085;
      font-size: 12px;
      font-weight: 400;
    }

    .subtitle {
      margin-top: 5px;
      color: #5f6b7a;
      font-size: 12px;
    }

    .main-button {
      min-width: 112px;
      height: 42px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #1f2937;
      font-weight: 700;
      box-shadow: var(--shadow);
    }

    .main-button:hover {
      background: #f8fafc;
    }

    /* 조회 프레임 */
    .search-frame {
      display: grid;
      grid-template-columns: minmax(170px, 220px) minmax(220px, 320px) auto;
      align-items: end;
      gap: 14px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .field label {
      color: #445267;
      font-size: 12px;
      font-weight: 700;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      min-height: 40px;
      padding: 8px 10px;
      border: 1px solid #c7d0dc;
      border-radius: 7px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .field textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.5;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(31, 94, 219, 0.12);
    }

    .search-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn {
      min-height: 40px;
      padding: 8px 16px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: #1f2937;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .btn:hover {
      filter: brightness(0.97);
    }

    .btn-blue {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    .btn-blue:hover {
      background: var(--blue-dark);
    }

    .btn-green {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
    }

    .btn-green:hover {
      background: var(--green-dark);
    }

    .btn-red {
      border-color: var(--red);
      background: var(--red);
      color: #fff;
    }

    .btn-red:hover {
      background: var(--red-dark);
    }

    .btn-orange {
      border-color: var(--orange);
      background: var(--orange);
      color: #fff;
    }

    /* 안내 및 업무 버튼 프레임 */
    .action-frame {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 0;
    }

    .guide-text {
      color: #617087;
      font-size: 12px;
    }

    .action-buttons {
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    /* 등록/수정 입력 프레임 */
    .editor-frame {
      display: none;
      margin-bottom: 12px;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .editor-frame.show {
      display: block;
    }

    .editor-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .editor-head h2 {
      margin: 0;
      color: #0e3f9d;
      font-size: 17px;
    }

    .mode-badge {
      padding: 5px 10px;
      border-radius: 999px;
      background: #e9eef7;
      color: #45556d;
      font-size: 11px;
      font-weight: 800;
    }

    .mode-badge.new {
      background: #e6f7ef;
      color: #047857;
    }

    .mode-badge.edit {
      background: #fff3df;
      color: #a35405;
    }

    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1.3fr 1fr 1fr;
      gap: 12px;
    }

    .editor-grid .full {
      grid-column: 1 / -1;
    }

    .char-count {
      margin-top: 4px;
      color: #64748b;
      font-size: 11px;
      text-align: right;
    }

    /* 목록 프레임 */
    .list-frame {
      padding: 14px 16px 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .list-title {
      margin: 2px 0 12px;
      color: #0e3f9d;
      font-size: 18px;
      text-align: center;
    }

    .table-wrap {
      width: 100%;
      max-height: 560px;
      overflow: auto;
      border: 1px solid #cbd5e1;
      background: #fff;
    }

    table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 12px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 3;
      padding: 10px 8px;
      border-right: 1px solid #1248a9;
      border-bottom: 1px solid #1248a9;
      background: #1e5bd7;
      color: #fff;
      font-weight: 800;
      text-align: center;
      white-space: nowrap;
    }

    tbody td,
    tfoot td {
      padding: 9px 8px;
      border-right: 1px solid #d8dee8;
      border-bottom: 1px solid #d8dee8;
      text-align: center;
      vertical-align: middle;
    }

    tbody tr {
      cursor: pointer;
    }

    tbody tr:hover {
      background: #f5f8fd;
    }

    tbody tr.selected {
      background: #e8f0ff;
      outline: 2px solid rgba(31, 94, 219, 0.28);
      outline-offset: -2px;
    }

    .notes-cell {
      overflow: hidden;
      text-align: left;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tfoot td {
      position: sticky;
      bottom: 0;
      z-index: 2;
      background: #edf2ff;
      color: #0e3f9d;
      font-weight: 800;
    }

    .empty {
      height: 130px;
      color: #64748b;
      text-align: center !important;
    }

    .list-footer {
      display: flex;
      justify-content: flex-end;
      padding-top: 10px;
      color: #475569;
      font-size: 12px;
      font-weight: 700;
    }

    .notice {
      display: none;
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 7px;
      font-size: 12px;
      line-height: 1.5;
    }

    .notice.show {
      display: block;
    }

    .notice.info {
      background: #eff6ff;
      color: #1d4ed8;
    }

    .notice.success {
      background: #ecfdf5;
      color: #047857;
    }

    .notice.error {
      background: #fff1f2;
      color: #be123c;
    }

    .loading {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.42);
    }

    .loading.show {
      display: flex;
    }

    .loading-box {
      padding: 17px 22px;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.18);
      font-weight: 800;
    }

    @media (max-width: 900px) {
      .search-frame {
        grid-template-columns: 1fr 1fr;
      }

      .search-buttons {
        grid-column: 1 / -1;
      }

      .editor-grid {
        grid-template-columns: 1fr 1fr;
      }

      .action-frame {
        align-items: flex-start;
        flex-direction: column;
      }

      .action-buttons {
        width: 100%;
        justify-content: flex-start;
      }
    }

    @media (max-width: 600px) {
      .page {
        padding: 8px;
      }

      .title-area h1 {
        font-size: 19px;
      }

      .file-name {
        display: block;
        margin: 3px 0 0;
      }

      .main-button {
        min-width: 92px;
        height: 38px;
        padding: 0 10px;
        font-size: 12px;
      }

      .search-frame,
      .editor-grid {
        grid-template-columns: 1fr;
      }

      .search-buttons {
        grid-column: auto;
        justify-content: stretch;
      }

      .search-buttons .btn {
        flex: 1;
      }

      .action-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .action-buttons .btn {
        width: 100%;
      }

      .list-frame {
        padding: 10px;
      }

      table {
        min-width: 900px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="title-frame">
      <div class="title-area">
        <h1>
          회사 관리
          <span class="file-name">_system_edit_company.html</span>
        </h1>
        <div class="subtitle">HeatPro MES · MES 사용회사 관리</div>
      </div>

      <button class="main-button" type="button" onclick="goMain()">⌂ 메인화면</button>
    </section>

    <section class="search-frame" aria-label="회사 조회 조건">
      <div class="field">
        <label for="searchCompanyCode">회사코드</label>
        <select id="searchCompanyCode">
          <option value="">전체</option>
        </select>
      </div>

      <div class="field">
        <label for="searchCompanyName">회사명</label>
        <input
          id="searchCompanyName"
          type="search"
          maxlength="100"
          placeholder="회사명을 입력하세요"
          autocomplete="off"
        >
      </div>

      <div class="search-buttons">
        <button class="btn btn-blue" type="button" onclick="searchRows()">🔍 조회</button>
        <button class="btn" type="button" onclick="resetSearch()">초기화</button>
      </div>
    </section>

    <section class="action-frame">
      <div id="guideText" class="guide-text">조회 버튼을 눌러 데이터를 불러오세요.</div>

      <div class="action-buttons">
        <button id="btnNew" class="btn btn-green" type="button" onclick="startNew()">＋ 등록</button>
        <button id="btnEdit" class="btn btn-blue" type="button" onclick="startEdit()" disabled>✎ 수정</button>
        <button id="btnDelete" class="btn btn-red" type="button" onclick="deleteSelected()" disabled>▣ 삭제</button>
        <button id="btnSave" class="btn btn-green" type="button" onclick="saveRecord()" disabled>▣ 저장</button>
      </div>
    </section>

    <div id="notice" class="notice" role="status" aria-live="polite"></div>

    <section id="editorFrame" class="editor-frame">
      <div class="editor-head">
        <h2>회사 정보 입력</h2>
        <span id="modeBadge" class="mode-badge">대기</span>
      </div>

      <form id="companyForm" onsubmit="return false;">
        <div class="editor-grid">
          <div class="field">
            <label for="companyCode">회사코드 *</label>
            <input id="companyCode" maxlength="30" autocomplete="off" disabled>
          </div>

          <div class="field">
            <label for="companyName">회사명 *</label>
            <input id="companyName" maxlength="100" autocomplete="off" disabled>
          </div>

          <div class="field">
            <label for="joinedDate">가입일</label>
            <input id="joinedDate" type="date" disabled>
          </div>

          <div class="field">
            <label for="endedDate">종료일</label>
            <input id="endedDate" type="date" disabled>
          </div>

          <div class="field full">
            <label for="specialNotes">특이사항</label>
            <textarea
              id="specialNotes"
              maxlength="500"
              placeholder="특이사항을 500자 이내로 입력하세요."
              disabled
              oninput="updateCharCount()"
            ></textarea>
            <div id="charCount" class="char-count">0 / 500자</div>
          </div>
        </div>
      </form>
    </section>

    <section class="list-frame">
      <h2 class="list-title">MES 사용 회사 목록</h2>

      <div class="table-wrap">
        <table>
          <colgroup>
            <col style="width: 70px;">
            <col style="width: 160px;">
            <col style="width: 220px;">
            <col style="width: 130px;">
            <col style="width: 130px;">
            <col style="width: 360px;">
          </colgroup>

          <thead>
            <tr>
              <th>NO</th>
              <th>회사코드</th>
              <th>회사명</th>
              <th>가입일</th>
              <th>종료일</th>
              <th>특이사항</th>
            </tr>
          </thead>

          <tbody id="tableBody">
            <tr>
              <td class="empty" colspan="6">조회 버튼을 눌러 데이터를 불러오세요.</td>
            </tr>
          </tbody>

          <tfoot>
            <tr>
              <td colspan="2">합계</td>
              <td id="totalCount" colspan="4">0건</td>
            </tr>
          </tfoot>
        </table>
      </div>

      <div id="countLabel" class="list-footer">총 0건</div>
    </section>
  </main>

  <div id="loadingOverlay" class="loading">
    <div id="loadingText" class="loading-box">처리 중입니다...</div>
  </div>

  <script>
    "use strict";

    const SUPABASE_URL = "https://enxtgbyslnryxvfpjdkc.supabase.co";
    const SUPABASE_KEY = "sb_publishable_9w9ktk0x4D8I6QodkWOthA_4FcxzMwD";

    const LOGIN_PAGE_URL = "../index.html";
    const MAIN_PAGE_URL = "main1.html";

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    let currentUser = null;
    let currentProfile = null;
    let allRows = [];
    let visibleRows = [];
    let selectedId = null;
    let mode = "view";

    const editableFieldIds = [
      "companyCode",
      "companyName",
      "joinedDate",
      "endedDate",
      "specialNotes"
    ];

    function normalizeText(value) {
      return String(value ?? "").trim();
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, function (character) {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[character];
      });
    }

    function formatDbError(error) {
      if (!error) return "알 수 없는 오류입니다.";
      if (error.code === "23505") return "같은 회사코드가 이미 등록되어 있습니다.";
      if (error.code === "23503") return "다른 업무 데이터에서 사용 중이므로 삭제할 수 없습니다.";
      if (error.code === "23514") return "종료일 또는 특이사항 입력값을 확인해 주세요.";
      if (error.code === "42501") return "이 작업에 대한 권한이 없습니다.";
      if (error.code === "PGRST202") return "회사 관리 RPC 함수의 입력항목이 현재 HTML과 일치하지 않습니다.";
      return error.message || String(error);
    }

    function showLoading(show, text = "처리 중입니다...") {
      document.getElementById("loadingText").textContent = text;
      document.getElementById("loadingOverlay").classList.toggle("show", Boolean(show));
    }

    function showNotice(text, type = "info") {
      const notice = document.getElementById("notice");
      notice.textContent = text;
      notice.className = "notice show " + type;
    }

    function clearNotice() {
      const notice = document.getElementById("notice");
      notice.textContent = "";
      notice.className = "notice";
    }

    function updateGuide(text) {
      document.getElementById("guideText").textContent = text;
    }

    function updateCharCount() {
      const length = document.getElementById("specialNotes").value.length;
      document.getElementById("charCount").textContent = length + " / 500자";
    }

    function setMode(nextMode) {
      mode = nextMode;
      const editing = mode === "new" || mode === "edit";

      editableFieldIds.forEach(function (id) {
        document.getElementById(id).disabled = !editing;
      });

      document.getElementById("btnSave").disabled = !editing;
      document.getElementById("btnEdit").disabled = !selectedId || editing;
      document.getElementById("btnDelete").disabled = !selectedId || editing;

      const editor = document.getElementById("editorFrame");
      editor.classList.toggle("show", editing || Boolean(selectedId));

      const badge = document.getElementById("modeBadge");
      badge.className =
        "mode-badge" +
        (mode === "new" ? " new" : mode === "edit" ? " edit" : "");

      badge.textContent =
        mode === "new"
          ? "신규등록"
          : mode === "edit"
            ? "수정중"
            : selectedId
              ? "선택됨"
              : "대기";
    }

    function clearForm() {
      selectedId = null;
      document.getElementById("companyForm").reset();
      updateCharCount();

      document.querySelectorAll("#tableBody tr").forEach(function (row) {
        row.classList.remove("selected");
      });
    }

    function fillForm(row) {
      document.getElementById("companyCode").value = row.company_code || "";
      document.getElementById("companyName").value = row.company_name || "";
      document.getElementById("joinedDate").value = row.joined_date || "";
      document.getElementById("endedDate").value = row.ended_date || "";
      document.getElementById("specialNotes").value = row.special_notes || "";
      updateCharCount();
    }

    async function verifySystemAdmin() {
      const { data: userData, error: userError } = await sb.auth.getUser();
      const user = userData?.user;

      if (userError || !user) {
        window.location.replace(LOGIN_PAGE_URL);
        return false;
      }

      const { data: profile, error: profileError } = await sb
        .from("profiles")
        .select("company_id,is_active,is_system_admin")
        .eq("user_id", user.id)
        .single();

      if (
        profileError ||
        !profile ||
        profile.is_active !== true ||
        profile.is_system_admin !== true
      ) {
        console.error("시스템 관리자 권한 확인 실패:", profileError);
        await sb.auth.signOut({ scope: "local" });
        window.location.replace(LOGIN_PAGE_URL);
        return false;
      }

      currentUser = user;
      currentProfile = profile;
      document.documentElement.classList.remove("auth-pending");
      return true;
    }

    async function loadRows() {
      showLoading(true, "회사 목록을 불러오는 중입니다...");
      clearNotice();

      const { data, error } = await sb.rpc("mes_system_company_list");

      showLoading(false);

      if (error) {
        allRows = [];
        visibleRows = [];
        renderRows();
        showNotice("조회 실패: " + formatDbError(error), "error");
        return;
      }

      allRows = data || [];
      populateCompanyCodeFilter();
      applySearch();
      clearForm();
      setMode("view");
      updateGuide("회사 목록을 불러왔습니다. 목록에서 회사를 선택할 수 있습니다.");
    }

    function populateCompanyCodeFilter() {
      const select = document.getElementById("searchCompanyCode");
      const currentValue = select.value;

      const options = allRows
        .map(function (row) {
          return normalizeText(row.company_code);
        })
        .filter(Boolean)
        .filter(function (value, index, array) {
          return array.indexOf(value) === index;
        })
        .sort();

      select.innerHTML =
        '<option value="">전체</option>' +
        options.map(function (code) {
          return '<option value="' + escapeHtml(code) + '">' +
            escapeHtml(code) +
            "</option>";
        }).join("");

      select.value = options.includes(currentValue) ? currentValue : "";
    }

    function applySearch() {
      const companyCode = document.getElementById("searchCompanyCode").value;
      const companyName = normalizeText(
        document.getElementById("searchCompanyName").value
      ).toLowerCase();

      visibleRows = allRows.filter(function (row) {
        const codeMatched =
          !companyCode || row.company_code === companyCode;

        const nameMatched =
          !companyName ||
          String(row.company_name || "").toLowerCase().includes(companyName);

        return codeMatched && nameMatched;
      });

      selectedId = null;
      renderRows();
      setMode("view");
    }

    async function searchRows() {
      clearNotice();

      if (!allRows.length) {
        await loadRows();
      } else {
        applySearch();
      }

      updateGuide("조회조건에 맞는 회사 " + visibleRows.length + "건을 표시합니다.");
    }

    function resetSearch() {
      document.getElementById("searchCompanyCode").value = "";
      document.getElementById("searchCompanyName").value = "";
      clearNotice();
      applySearch();
      updateGuide("조회조건을 초기화했습니다.");
    }

    function renderRows() {
      const body = document.getElementById("tableBody");

      if (!visibleRows.length) {
        body.innerHTML =
          '<tr><td class="empty" colspan="6">표시할 회사가 없습니다.</td></tr>';
      } else {
        body.innerHTML = visibleRows.map(function (row, index) {
          return `
            <tr
              data-id="${escapeHtml(row.company_id)}"
              onclick="selectRow('${escapeHtml(row.company_id)}')"
            >
              <td>${index + 1}</td>
              <td>${escapeHtml(row.company_code)}</td>
              <td>${escapeHtml(row.company_name)}</td>
              <td>${escapeHtml(row.joined_date)}</td>
              <td>${escapeHtml(row.ended_date)}</td>
              <td
                class="notes-cell"
                title="${escapeHtml(row.special_notes)}"
              >${escapeHtml(row.special_notes)}</td>
            </tr>
          `;
        }).join("");
      }

      document.getElementById("totalCount").textContent =
        visibleRows.length + "건";

      document.getElementById("countLabel").textContent =
        "총 " + visibleRows.length + "건";
    }

    function selectRow(id) {
      const row = allRows.find(function (item) {
        return item.company_id === id;
      });

      if (!row) return;

      selectedId = id;
      fillForm(row);

      document.querySelectorAll("#tableBody tr").forEach(function (tableRow) {
        tableRow.classList.toggle("selected", tableRow.dataset.id === id);
      });

      clearNotice();
      setMode("view");
      updateGuide("선택한 회사를 수정하거나 삭제할 수 있습니다.");
    }

    function startNew() {
      clearNotice();
      clearForm();
      setMode("new");
      updateGuide("새 MES 사용회사를 입력한 후 저장 버튼을 누르세요.");
      document.getElementById("companyCode").focus();
    }

    function startEdit() {
      if (!selectedId) {
        showNotice("수정할 회사를 목록에서 선택해 주세요.", "error");
        return;
      }

      clearNotice();
      setMode("edit");
      updateGuide("수정할 내용을 입력한 후 저장 버튼을 누르세요.");
      document.getElementById("companyName").focus();
    }

    async function saveRecord() {
      if (mode !== "new" && mode !== "edit") {
        showNotice("등록 또는 수정 버튼을 먼저 눌러 주세요.", "error");
        return;
      }

      const companyCode = normalizeText(
        document.getElementById("companyCode").value
      ).toUpperCase();

      const companyName = normalizeText(
        document.getElementById("companyName").value
      );

      const joinedDate =
        document.getElementById("joinedDate").value || null;

      const endedDate =
        document.getElementById("endedDate").value || null;

      const specialNotes = normalizeText(
        document.getElementById("specialNotes").value
      ) || null;

      if (!companyCode || !companyName) {
        showNotice("회사코드와 회사명을 입력해 주세요.", "error");
        return;
      }

      if (specialNotes && specialNotes.length > 500) {
        showNotice("특이사항은 500자 이하로 입력해 주세요.", "error");
        return;
      }

      if (joinedDate && endedDate && endedDate < joinedDate) {
        showNotice("종료일은 가입일보다 빠를 수 없습니다.", "error");
        return;
      }

      showLoading(true, "회사 정보를 Supabase에 저장하는 중입니다...");

      const { error } = await sb.rpc("mes_system_company_save", {
        p_company_id: mode === "edit" ? selectedId : null,
        p_company_code: companyCode,
        p_company_name: companyName,
        p_joined_date: joinedDate,
        p_ended_date: endedDate,
        p_special_notes: specialNotes
      });

      showLoading(false);

      if (error) {
        showNotice("저장 실패: " + formatDbError(error), "error");
        return;
      }

      showNotice(
        mode === "new"
          ? "회사가 Supabase에 신규 등록되었습니다."
          : "회사 정보가 Supabase에 수정 저장되었습니다.",
        "success"
      );

      await loadRows();
    }

    async function deleteSelected() {
      if (!selectedId) {
        showNotice("삭제할 회사를 목록에서 선택해 주세요.", "error");
        return;
      }

      const row = allRows.find(function (item) {
        return item.company_id === selectedId;
      });

      const confirmed = confirm(
        (row?.company_name || "선택한 회사") +
        "를 삭제하시겠습니까?\n연결된 업무 데이터가 있으면 삭제되지 않습니다."
      );

      if (!confirmed) return;

      showLoading(true, "회사 정보를 Supabase에서 삭제하는 중입니다...");

      const { error } = await sb.rpc("mes_system_company_delete", {
        p_company_id: selectedId
      });

      showLoading(false);

      if (error) {
        showNotice("삭제 실패: " + formatDbError(error), "error");
        return;
      }

      showNotice("회사가 Supabase에서 삭제되었습니다.", "success");
      await loadRows();
    }

    function goMain() {
      window.location.href = MAIN_PAGE_URL;
    }

    async function logout() {
      await sb.auth.signOut({ scope: "local" });
      window.location.replace(LOGIN_PAGE_URL);
    }

    sb.auth.onAuthStateChange(function (event) {
      if (event === "SIGNED_OUT") {
        window.location.replace(LOGIN_PAGE_URL);
      }
    });

    async function initializePage() {
      try {
        const allowed = await verifySystemAdmin();
        if (!allowed) return;

        setMode("view");
        await loadRows();
      } catch (error) {
        document.documentElement.classList.remove("auth-pending");
        showNotice("화면 초기화 오류: " + formatDbError(error), "error");
      }
    }

    window.addEventListener("load", initializePage);
  </script>
</body>
</html>
