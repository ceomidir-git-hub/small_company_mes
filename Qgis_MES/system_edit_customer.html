<!DOCTYPE html>
<html lang="ko" class="auth-pending">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고객사 관리 | HeatPro MES</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #f4f6f9;
      --card: #ffffff;
      --line: #cfd6e1;
      --line-soft: #e3e8ef;
      --text: #1f2937;
      --muted: #64748b;
      --blue: #1f5edb;
      --blue-dark: #1647ad;
      --green: #079660;
      --green-dark: #05784d;
      --red: #dc2f45;
      --red-dark: #b91f34;
      --orange: #e38b20;
      --shadow: 0 3px 12px rgba(15, 23, 42, 0.06);
      --radius: 9px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    html.auth-pending body {
      visibility: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .page {
      width: 100%;
      margin: 0 auto;
      padding: 12px;
    }

    /* 상단 제목 / 메인화면 프레임 */
    .title-frame {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .title-area h1 {
      margin: 0;
      color: #0e3f9d;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: -0.5px;
    }

    .file-name {
      margin-left: 5px;
      color: #667085;
      font-size: 12px;
      font-weight: 400;
    }

    .subtitle {
      margin-top: 5px;
      color: #5f6b7a;
      font-size: 12px;
    }

    .main-button {
      min-width: 112px;
      height: 42px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #1f2937;
      font-weight: 700;
      box-shadow: var(--shadow);
    }

    .main-button:hover {
      background: #f8fafc;
    }

    /* 조회 프레임 */
    .search-frame {
      display: grid;
      grid-template-columns: minmax(170px, 220px) minmax(220px, 320px) auto;
      align-items: end;
      gap: 14px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .field label {
      color: #445267;
      font-size: 12px;
      font-weight: 700;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      min-height: 40px;
      padding: 8px 10px;
      border: 1px solid #c7d0dc;
      border-radius: 7px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .field textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.5;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(31, 94, 219, 0.12);
    }

    .search-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn {
      min-height: 40px;
      padding: 8px 16px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: #1f2937;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .btn:hover {
      filter: brightness(0.97);
    }

    .btn-blue {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    .btn-blue:hover {
      background: var(--blue-dark);
    }

    .btn-green {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
    }

    .btn-green:hover {
      background: var(--green-dark);
    }

    .btn-red {
      border-color: var(--red);
      background: var(--red);
      color: #fff;
    }

    .btn-red:hover {
      background: var(--red-dark);
    }

    .btn-orange {
      border-color: var(--orange);
      background: var(--orange);
      color: #fff;
    }

    /* 안내 및 업무 버튼 프레임 */
    .action-frame {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 0;
    }

    .guide-text {
      color: #617087;
      font-size: 12px;
    }

    .action-buttons {
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    /* 등록/수정 입력 프레임 */
    .editor-frame {
      display: none;
      margin-bottom: 12px;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .editor-frame.show {
      display: block;
    }

    .editor-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .editor-head h2 {
      margin: 0;
      color: #0e3f9d;
      font-size: 17px;
    }

    .mode-badge {
      padding: 5px 10px;
      border-radius: 999px;
      background: #e9eef7;
      color: #45556d;
      font-size: 11px;
      font-weight: 800;
    }

    .mode-badge.new {
      background: #e6f7ef;
      color: #047857;
    }

    .mode-badge.edit {
      background: #fff3df;
      color: #a35405;
    }

    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1.3fr 1fr 1fr;
      gap: 12px;
    }

    .editor-grid .full {
      grid-column: 1 / -1;
    }

    .char-count {
      margin-top: 4px;
      color: #64748b;
      font-size: 11px;
      text-align: right;
    }

    /* 목록 프레임 */
    .list-frame {
      padding: 14px 16px 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .list-title {
      margin: 2px 0 12px;
      color: #0e3f9d;
      font-size: 18px;
      text-align: center;
    }

    .table-wrap {
      width: 100%;
      max-height: 560px;
      overflow: auto;
      border: 1px solid #cbd5e1;
      background: #fff;
    }

    table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 12px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 3;
      padding: 10px 8px;
      border-right: 1px solid #1248a9;
      border-bottom: 1px solid #1248a9;
      background: #1e5bd7;
      color: #fff;
      font-weight: 800;
      text-align: center;
      white-space: nowrap;
    }

    tbody td,
    tfoot td {
      padding: 9px 8px;
      border-right: 1px solid #d8dee8;
      border-bottom: 1px solid #d8dee8;
      text-align: center;
      vertical-align: middle;
    }

    tbody tr {
      cursor: pointer;
    }

    tbody tr:hover {
      background: #f5f8fd;
    }

    tbody tr.selected {
      background: #e8f0ff;
      outline: 2px solid rgba(31, 94, 219, 0.28);
      outline-offset: -2px;
    }

    .notes-cell {
      overflow: hidden;
      text-align: left;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tfoot td {
      position: sticky;
      bottom: 0;
      z-index: 2;
      background: #edf2ff;
      color: #0e3f9d;
      font-weight: 800;
    }

    .empty {
      height: 130px;
      color: #64748b;
      text-align: center !important;
    }

    .list-footer {
      display: flex;
      justify-content: flex-end;
      padding-top: 10px;
      color: #475569;
      font-size: 12px;
      font-weight: 700;
    }

    .notice {
      display: none;
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 7px;
      font-size: 12px;
      line-height: 1.5;
    }

    .notice.show {
      display: block;
    }

    .notice.info {
      background: #eff6ff;
      color: #1d4ed8;
    }

    .notice.success {
      background: #ecfdf5;
      color: #047857;
    }

    .notice.error {
      background: #fff1f2;
      color: #be123c;
    }

    .loading {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.42);
    }

    .loading.show {
      display: flex;
    }

    .loading-box {
      padding: 17px 22px;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.18);
      font-weight: 800;
    }

    @media (max-width: 900px) {
      .search-frame {
        grid-template-columns: 1fr 1fr;
      }

      .search-buttons {
        grid-column: 1 / -1;
      }

      .editor-grid {
        grid-template-columns: 1fr 1fr;
      }

      .action-frame {
        align-items: flex-start;
        flex-direction: column;
      }

      .action-buttons {
        width: 100%;
        justify-content: flex-start;
      }
    }

    @media (max-width: 600px) {
      .page {
        padding: 8px;
      }

      .title-area h1 {
        font-size: 19px;
      }

      .file-name {
        display: block;
        margin: 3px 0 0;
      }

      .main-button {
        min-width: 92px;
        height: 38px;
        padding: 0 10px;
        font-size: 12px;
      }

      .search-frame,
      .editor-grid {
        grid-template-columns: 1fr;
      }

      .search-buttons {
        grid-column: auto;
        justify-content: stretch;
      }

      .search-buttons .btn {
        flex: 1;
      }

      .action-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .action-buttons .btn {
        width: 100%;
      }

      .list-frame {
        padding: 10px;
      }

      table {
        min-width: 900px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="title-frame">
      <div class="title-area">
        <h1>
          고객사 관리
          <span class="file-name">_system_edit_customer.html</span>
        </h1>
        <div class="subtitle">HeatPro MES · 로그인 회사의 고객사 조회·등록·수정·삭제</div>
      </div>

      <button class="main-button" type="button" onclick="goMain()">⌂ 메인화면</button>
    </section>

    <section class="search-frame" aria-label="고객사 조회 조건">
      <div class="field">
        <label for="searchCompanyNumber">고객관리번호</label>
        <input
          id="searchCompanyNumber"
          type="search"
          maxlength="50"
          placeholder="전체"
          autocomplete="off"
        >
      </div>

      <div class="field">
        <label for="searchCustomerName">고객사명</label>
        <input
          id="searchCustomerName"
          type="search"
          maxlength="150"
          placeholder="고객사명을 입력하세요"
          autocomplete="off"
        >
      </div>

      <div class="search-buttons">
        <button class="btn btn-blue" type="button" onclick="searchRows()">🔍 조회</button>
        <button class="btn" type="button" onclick="resetSearch()">초기화</button>
      </div>
    </section>

    <section class="action-frame">
      <div id="guideText" class="guide-text">고객사 데이터를 불러오는 중입니다.</div>

      <div class="action-buttons">
        <button id="btnNew" class="btn btn-green" type="button" onclick="startNew()">＋ 등록</button>
        <button id="btnEdit" class="btn btn-blue" type="button" onclick="startEdit()" disabled>✎ 수정</button>
        <button id="btnDelete" class="btn btn-red" type="button" onclick="deleteSelected()" disabled>▣ 삭제</button>
        <button id="btnSave" class="btn btn-green" type="button" onclick="saveRecord()" disabled>▣ 저장</button>
      </div>
    </section>

    <div id="notice" class="notice" role="status" aria-live="polite"></div>

    <section id="editorFrame" class="editor-frame">
      <div class="editor-head">
        <h2>고객사 정보 입력</h2>
        <span id="modeBadge" class="mode-badge">대기</span>
      </div>

      <form id="customerForm" onsubmit="return false;">
        <div class="editor-grid">
          <div class="field">
            <label for="companyNumber">고객관리번호 *</label>
            <input id="companyNumber" maxlength="50" autocomplete="off" disabled>
          </div>

          <div class="field">
            <label for="customerName">고객사명 *</label>
            <input id="customerName" maxlength="150" autocomplete="off" disabled>
          </div>

          <div class="field">
            <label for="boss">대표자</label>
            <input id="boss" maxlength="100" autocomplete="off" disabled>
          </div>

          <div class="field">
            <label for="manager">담당자</label>
            <input id="manager" maxlength="100" autocomplete="off" disabled>
          </div>

          <div class="field">
            <label for="phone">전화번호</label>
            <input id="phone" type="tel" maxlength="50" autocomplete="off" disabled>
          </div>

          <div class="field">
            <label>사용 상태</label>
            <div class="checkbox-line">
              <input id="isActive" type="checkbox" checked disabled>
              <label for="isActive">사용</label>
            </div>
          </div>

          <div class="field full">
            <label for="address">주소</label>
            <textarea id="address" maxlength="300" disabled></textarea>
          </div>
        </div>
      </form>
    </section>

    <section class="list-frame">
      <h2 class="list-title">고객사 상세현황</h2>

      <div class="table-wrap">
        <table>
          <colgroup>
            <col style="width:70px;">
            <col style="width:150px;">
            <col style="width:220px;">
            <col style="width:130px;">
            <col style="width:130px;">
            <col style="width:150px;">
            <col style="width:320px;">
            <col style="width:90px;">
          </colgroup>

          <thead>
            <tr>
              <th>NO</th>
              <th>고객관리번호</th>
              <th>고객사명</th>
              <th>대표자</th>
              <th>담당자</th>
              <th>전화번호</th>
              <th>주소</th>
              <th>상태</th>
            </tr>
          </thead>

          <tbody id="tableBody">
            <tr>
              <td class="empty" colspan="8">고객사 데이터를 불러오는 중입니다.</td>
            </tr>
          </tbody>

          <tfoot>
            <tr>
              <td colspan="2">합계</td>
              <td id="totalCount" colspan="6">0건</td>
            </tr>
          </tfoot>
        </table>
      </div>

      <div id="countLabel" class="list-footer">총 0건</div>
    </section>
  </main>

  <div id="loadingOverlay" class="loading">
    <div id="loadingText" class="loading-box">처리 중입니다...</div>
  </div>

  <script>
    "use strict";

    const SUPABASE_URL = "https://enxtgbyslnryxvfpjdkc.supabase.co";
    const SUPABASE_KEY = "sb_publishable_9w9ktk0x4D8I6QodkWOthA_4FcxzMwD";

    const LOGIN_PAGE_URL = "../index.html";
    const MAIN_PAGE_URL = "main1.html";

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    let currentUser = null;
    let currentProfile = null;
    let allRows = [];
    let visibleRows = [];
    let selectedId = null;
    let mode = "view";

    const editableFieldIds = [
      "companyNumber",
      "customerName",
      "boss",
      "manager",
      "phone",
      "address",
      "isActive"
    ];

    function normalizeText(value) {
      return String(value ?? "").trim();
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, function (character) {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[character];
      });
    }

    function formatDbError(error) {
      if (!error) return "알 수 없는 오류입니다.";
      if (error.code === "23505") return "같은 회사에 같은 고객관리번호가 이미 등록되어 있습니다.";
      if (error.code === "23503") return "품목 등 다른 업무 데이터에서 사용 중이므로 삭제할 수 없습니다.";
      if (error.code === "42501") return "이 작업에 대한 권한이 없습니다. Supabase RLS 정책을 확인해 주세요.";
      return error.message || String(error);
    }

    function showLoading(show, text = "처리 중입니다...") {
      document.getElementById("loadingText").textContent = text;
      document.getElementById("loadingOverlay").classList.toggle("show", Boolean(show));
    }

    function showNotice(text, type = "info") {
      const notice = document.getElementById("notice");
      notice.textContent = text;
      notice.className = "notice show " + type;
    }

    function clearNotice() {
      const notice = document.getElementById("notice");
      notice.textContent = "";
      notice.className = "notice";
    }

    function updateGuide(text) {
      document.getElementById("guideText").textContent = text;
    }

    async function verifyCompanyAccess() {
      const { data: userData, error: userError } = await sb.auth.getUser();
      const user = userData?.user;

      if (userError || !user) {
        window.location.replace(LOGIN_PAGE_URL);
        return false;
      }

      const { data: profile, error: profileError } = await sb
        .from("profiles")
        .select("company_id,is_active")
        .eq("user_id", user.id)
        .single();

      if (
        profileError ||
        !profile ||
        profile.is_active !== true ||
        !profile.company_id
      ) {
        console.error("회사 권한 확인 실패:", profileError);
        await sb.auth.signOut({ scope: "local" });
        window.location.replace(LOGIN_PAGE_URL);
        return false;
      }

      currentUser = user;
      currentProfile = profile;
      document.documentElement.classList.remove("auth-pending");
      return true;
    }

    function setMode(nextMode) {
      mode = nextMode;
      const editing = mode === "new" || mode === "edit";

      editableFieldIds.forEach(function (id) {
        document.getElementById(id).disabled = !editing;
      });

      document.getElementById("btnSave").disabled = !editing;
      document.getElementById("btnEdit").disabled = !selectedId || editing;
      document.getElementById("btnDelete").disabled = !selectedId || editing;

      document.getElementById("editorFrame").classList.toggle(
        "show",
        editing || Boolean(selectedId)
      );

      const badge = document.getElementById("modeBadge");
      badge.className =
        "mode-badge" +
        (mode === "new" ? " new" : mode === "edit" ? " edit" : "");

      badge.textContent =
        mode === "new"
          ? "신규등록"
          : mode === "edit"
            ? "수정중"
            : selectedId
              ? "선택됨"
              : "대기";
    }

    function clearForm() {
      selectedId = null;
      document.getElementById("customerForm").reset();
      document.getElementById("isActive").checked = true;

      document.querySelectorAll("#tableBody tr").forEach(function (row) {
        row.classList.remove("selected");
      });
    }

    function fillForm(row) {
      document.getElementById("companyNumber").value = row.company_number || "";
      document.getElementById("customerName").value = row.customer_name || "";
      document.getElementById("boss").value = row.boss || "";
      document.getElementById("manager").value = row.manager || "";
      document.getElementById("phone").value = row.phone || "";
      document.getElementById("address").value = row.address || "";
      document.getElementById("isActive").checked = row.is_active !== false;
    }

    async function loadRows() {
      if (!currentProfile) return;

      showLoading(true, "고객사 목록을 불러오는 중입니다...");
      clearNotice();

      const { data, error } = await sb
        .from("customers")
        .select(
          "customer_system_id,company_number,customer_name,boss,manager,phone,address,is_active"
        )
        .eq("company_id", currentProfile.company_id)
        .order("company_number", { ascending: true });

      showLoading(false);

      if (error) {
        allRows = [];
        visibleRows = [];
        renderRows();
        showNotice("조회 실패: " + formatDbError(error), "error");
        updateGuide("고객사 조회에 실패했습니다.");
        return;
      }

      allRows = data || [];
      applySearch();
      clearForm();
      setMode("view");
      updateGuide("고객사 " + allRows.length + "건을 불러왔습니다.");
    }

    function applySearch() {
      const companyNumber = normalizeText(
        document.getElementById("searchCompanyNumber").value
      ).toLowerCase();

      const customerName = normalizeText(
        document.getElementById("searchCustomerName").value
      ).toLowerCase();

      visibleRows = allRows.filter(function (row) {
        const numberMatched =
          !companyNumber ||
          String(row.company_number || "").toLowerCase().includes(companyNumber);

        const nameMatched =
          !customerName ||
          String(row.customer_name || "").toLowerCase().includes(customerName);

        return numberMatched && nameMatched;
      });

      selectedId = null;
      renderRows();
      setMode("view");
    }

    async function searchRows() {
      clearNotice();

      if (!currentProfile) {
        showNotice("로그인 회사정보를 확인할 수 없습니다.", "error");
        return;
      }

      if (!allRows.length) {
        await loadRows();
      } else {
        applySearch();
      }

      updateGuide(
        "조회조건에 맞는 고객사 " + visibleRows.length + "건을 표시합니다."
      );
    }

    function resetSearch() {
      document.getElementById("searchCompanyNumber").value = "";
      document.getElementById("searchCustomerName").value = "";
      clearNotice();
      applySearch();
      updateGuide("조회조건을 초기화했습니다.");
    }

    function renderRows() {
      const body = document.getElementById("tableBody");

      if (!visibleRows.length) {
        body.innerHTML =
          '<tr><td class="empty" colspan="8">표시할 고객사가 없습니다.</td></tr>';
      } else {
        body.innerHTML = visibleRows.map(function (row, index) {
          return `
            <tr
              data-id="${escapeHtml(row.customer_system_id)}"
              onclick="selectRow('${escapeHtml(row.customer_system_id)}')"
            >
              <td>${index + 1}</td>
              <td>${escapeHtml(row.company_number)}</td>
              <td>${escapeHtml(row.customer_name)}</td>
              <td>${escapeHtml(row.boss)}</td>
              <td>${escapeHtml(row.manager)}</td>
              <td>${escapeHtml(row.phone)}</td>
              <td class="notes-cell" title="${escapeHtml(row.address)}">${escapeHtml(row.address)}</td>
              <td>${row.is_active ? "사용" : "중지"}</td>
            </tr>
          `;
        }).join("");
      }

      document.getElementById("totalCount").textContent =
        visibleRows.length + "건";

      document.getElementById("countLabel").textContent =
        "총 " + visibleRows.length + "건";
    }

    function selectRow(id) {
      const row = allRows.find(function (item) {
        return item.customer_system_id === id;
      });

      if (!row) return;

      selectedId = id;
      fillForm(row);

      document.querySelectorAll("#tableBody tr").forEach(function (tableRow) {
        tableRow.classList.toggle("selected", tableRow.dataset.id === id);
      });

      clearNotice();
      setMode("view");
      updateGuide("선택한 고객사를 수정하거나 삭제할 수 있습니다.");
    }

    function startNew() {
      clearNotice();
      clearForm();
      setMode("new");
      updateGuide("신규 고객사 정보를 입력한 후 저장 버튼을 누르세요.");
      document.getElementById("companyNumber").focus();
    }

    function startEdit() {
      if (!selectedId) {
        showNotice("수정할 고객사를 목록에서 선택해 주세요.", "error");
        return;
      }

      clearNotice();
      setMode("edit");
      updateGuide("수정할 내용을 입력한 후 저장 버튼을 누르세요.");
      document.getElementById("customerName").focus();
    }

    async function saveRecord() {
      if (mode !== "new" && mode !== "edit") {
        showNotice("등록 또는 수정 버튼을 먼저 눌러 주세요.", "error");
        return;
      }

      const payload = {
        company_id: currentProfile.company_id,
        company_number: normalizeText(
          document.getElementById("companyNumber").value
        ),
        customer_name: normalizeText(
          document.getElementById("customerName").value
        ),
        boss: normalizeText(document.getElementById("boss").value) || null,
        manager: normalizeText(document.getElementById("manager").value) || null,
        phone: normalizeText(document.getElementById("phone").value) || null,
        address: normalizeText(document.getElementById("address").value) || null,
        is_active: document.getElementById("isActive").checked
      };

      if (!payload.company_number || !payload.customer_name) {
        showNotice("고객관리번호와 고객사명을 입력해 주세요.", "error");
        return;
      }

      showLoading(true, "고객사 정보를 Supabase에 저장하는 중입니다...");

      let result;

      if (mode === "new") {
        result = await sb
          .from("customers")
          .insert(payload);
      } else {
        result = await sb
          .from("customers")
          .update(payload)
          .eq("customer_system_id", selectedId)
          .eq("company_id", currentProfile.company_id);
      }

      showLoading(false);

      if (result.error) {
        showNotice("저장 실패: " + formatDbError(result.error), "error");
        return;
      }

      showNotice(
        mode === "new"
          ? "고객사가 Supabase에 신규 등록되었습니다."
          : "고객사 정보가 Supabase에 수정 저장되었습니다.",
        "success"
      );

      await loadRows();
    }

    async function deleteSelected() {
      if (!selectedId) {
        showNotice("삭제할 고객사를 목록에서 선택해 주세요.", "error");
        return;
      }

      const row = allRows.find(function (item) {
        return item.customer_system_id === selectedId;
      });

      const confirmed = confirm(
        (row?.customer_name || "선택한 고객사") +
        "를 삭제하시겠습니까?\n품목 등에서 사용 중이면 삭제되지 않습니다."
      );

      if (!confirmed) return;

      showLoading(true, "고객사를 Supabase에서 삭제하는 중입니다...");

      const { error } = await sb
        .from("customers")
        .delete()
        .eq("customer_system_id", selectedId)
        .eq("company_id", currentProfile.company_id);

      showLoading(false);

      if (error) {
        showNotice("삭제 실패: " + formatDbError(error), "error");
        return;
      }

      showNotice("고객사가 Supabase에서 삭제되었습니다.", "success");
      await loadRows();
    }

    function goMain() {
      window.location.href = MAIN_PAGE_URL;
    }

    async function logout() {
      await sb.auth.signOut({ scope: "local" });
      window.location.replace(LOGIN_PAGE_URL);
    }

    sb.auth.onAuthStateChange(function (event) {
      if (event === "SIGNED_OUT") {
        window.location.replace(LOGIN_PAGE_URL);
      }
    });

    async function initializePage() {
      try {
        const allowed = await verifyCompanyAccess();
        if (!allowed) return;

        setMode("view");
        await loadRows();
      } catch (error) {
        document.documentElement.classList.remove("auth-pending");
        showNotice("화면 초기화 오류: " + formatDbError(error), "error");
      }
    }

    window.addEventListener("load", initializePage);
  </script>
</body>
</html>
