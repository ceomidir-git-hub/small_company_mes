<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeatPro MES — 로그인</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --page-bg: #000000;
      --card-bg-1: #222832;
      --card-bg-2: #1b222c;
      --input-bg: #15191e;
      --input-border: #39414d;
      --card-border: rgba(92, 108, 138, 0.28);
      --text: #ffffff;
      --muted: #8fa1bc;
      --label: #aebbd0;
      --placeholder: #66758d;
      --accent: #ff693d;
      --accent-hover: #ff7a54;
      --good: #39e481;
      --bad: #ff7474;
      --font-body: "Noto Sans KR", sans-serif;
      --font-mono: "IBM Plex Mono", monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: var(--page-bg);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      color: var(--text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    .login-card {
      width: min(100%, 410px);
      padding: 28px 22px 22px;
      border: 1px solid var(--card-border);
      border-radius: 24px;
      background:
        radial-gradient(circle at top left, rgba(77, 98, 138, 0.13), transparent 38%),
        linear-gradient(145deg, var(--card-bg-1), var(--card-bg-2));
      box-shadow:
        0 20px 50px rgba(0, 0, 0, 0.55),
        inset 0 0 0 1px rgba(255, 255, 255, 0.015);
    }

    .secure-label {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 14px;
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 0.73rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .secure-label::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--good);
      box-shadow: 0 0 9px rgba(57, 228, 129, 0.85);
      flex-shrink: 0;
    }

    h1 {
      margin-bottom: 8px;
      font-size: 1.85rem;
      line-height: 1.25;
      font-weight: 700;
      letter-spacing: -0.045em;
    }

    .description {
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.55;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      color: var(--label);
      font-size: 0.79rem;
      font-weight: 700;
    }

    .input-wrap {
      position: relative;
    }

    .field input {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      border: 1px solid var(--input-border);
      border-radius: 13px;
      outline: none;
      background: var(--input-bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.94rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field input::placeholder {
      color: var(--placeholder);
    }

    .field input:focus {
      border-color: rgba(255, 105, 61, 0.72);
      box-shadow: 0 0 0 3px rgba(255, 105, 61, 0.16);
    }

    .password-input {
      padding-right: 58px !important;
    }

    .password-toggle {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      padding: 6px 4px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 0.75rem;
      cursor: pointer;
    }

    .password-toggle:hover {
      color: var(--text);
    }

    .login-button {
      width: 100%;
      height: 50px;
      margin-top: 5px;
      border: 0;
      border-radius: 13px;
      background: linear-gradient(180deg, #ff7548, var(--accent));
      color: #120905;
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(255, 105, 61, 0.17);
      transition: transform 0.15s, filter 0.15s, opacity 0.15s;
    }

    .login-button:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    .login-button:disabled {
      cursor: wait;
      opacity: 0.68;
    }

    .message {
      display: none;
      margin-top: 13px;
      padding: 10px 12px;
      border: 1px solid var(--input-border);
      border-radius: 11px;
      font-size: 0.76rem;
      line-height: 1.5;
    }

    .message.show {
      display: block;
    }

    .message.error {
      border-color: rgba(255, 116, 116, 0.42);
      background: rgba(255, 116, 116, 0.11);
      color: #ffaaaa;
    }

    .message.success {
      border-color: rgba(57, 228, 129, 0.42);
      background: rgba(57, 228, 129, 0.11);
      color: #97f0b9;
    }

    /* 태블릿 */
    @media (min-width: 600px) and (max-width: 1024px) {
      body {
        padding: 24px;
      }

      .login-card {
        width: min(100%, 430px);
        padding: 31px 25px 25px;
        border-radius: 26px;
      }

      h1 {
        font-size: 2rem;
      }

      .field input {
        height: 50px;
      }

      .login-button {
        height: 52px;
      }
    }

    /* 핸드폰 */
    @media (max-width: 599px) {
      body {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 14px 12px;
      }

      .login-card {
        width: 100%;
        max-width: 390px;
        padding: 24px 18px 19px;
        border-radius: 20px;
      }

      h1 {
        font-size: 1.75rem;
      }

      .description {
        margin-bottom: 22px;
        font-size: 0.83rem;
      }

      .field input {
        height: 47px;
        border-radius: 12px;
      }

      .login-button {
        height: 49px;
        border-radius: 12px;
      }
    }

    /* 아주 작은 핸드폰 */
    @media (max-width: 360px) {
      body {
        padding: 10px 8px;
      }

      .login-card {
        padding: 21px 15px 17px;
        border-radius: 18px;
      }

      h1 {
        font-size: 1.6rem;
      }

      .description {
        font-size: 0.79rem;
      }

      .field input {
        height: 45px;
        font-size: 0.9rem;
      }

      .login-button {
        height: 47px;
      }
    }
  </style>
</head>

<body>
  <main class="login-card">
    <div class="secure-label">SECURE LOGIN</div>

    <h1>MES 로그인</h1>
    <p class="description">등록된 이메일과 비밀번호를 입력해 주세요.</p>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">이메일</label>
        <div class="input-wrap">
          <input
            id="email"
            name="email"
            type="email"
            inputmode="email"
            autocomplete="email"
            placeholder="example@company.com"
            required
          >
        </div>
      </div>

      <div class="field">
        <label for="password">비밀번호</label>
        <div class="input-wrap">
          <input
            id="password"
            class="password-input"
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder="비밀번호 입력"
            minlength="6"
            required
          >
          <button
            id="passwordToggle"
            class="password-toggle"
            type="button"
            aria-label="비밀번호 표시"
          >보기</button>
        </div>
      </div>

      <button id="loginButton" class="login-button" type="submit">
        로그인
      </button>

      <div
        id="loginMessage"
        class="message"
        role="status"
        aria-live="polite"
      ></div>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    "use strict";

    /*
      아래 두 값을 실제 Supabase 프로젝트 값으로 교체합니다.

      브라우저에서는 Publishable key 또는 anon key만 사용합니다.
      service_role key는 절대 사용하지 않습니다.
    */
    const SUPABASE_URL = "https://enxtgbyslnryxvfpjdkc.supabase.co";
    const SUPABASE_KEY = "sb_publishable_9w9ktk0x4D8I6QodkWOthA_4FcxzMwD";

    const COMPANY_MAIN_PAGES = {
      "17f2ff71-20db-49ff-b682-279989776817": "Qgis_MES/main1.html"
    };

    let supabaseClient = null;

    const loginForm = document.getElementById("loginForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginButton = document.getElementById("loginButton");
    const loginMessage = document.getElementById("loginMessage");
    const passwordToggle = document.getElementById("passwordToggle");

    function isSupabaseConfigured() {
      return (
        SUPABASE_URL &&
        SUPABASE_KEY &&
        !SUPABASE_URL.includes("YOUR_PROJECT_ID") &&
        !SUPABASE_KEY.includes("YOUR_SUPABASE")
      );
    }

    function showMessage(text, type) {
      loginMessage.textContent = text;
      loginMessage.className = "message show " + type;
    }

    function clearMessage() {
      loginMessage.textContent = "";
      loginMessage.className = "message";
    }

    function setLoading(isLoading) {
      loginButton.disabled = isLoading;
      loginButton.textContent = isLoading ? "로그인 확인 중..." : "로그인";
    }

    function createSupabaseClient() {
      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        throw new Error("Supabase 로그인 모듈을 불러오지 못했습니다.");
      }

      return window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      });
    }

    async function redirectByCompany(userId) {
      const { data: profile, error } = await supabaseClient
        .from("profiles")
        .select("company_id, is_active")
        .eq("user_id", userId)
        .single();

      if (error || !profile) {
        console.error("회사 프로필 조회 오류:", error);
        await supabaseClient.auth.signOut();
        throw new Error("로그인 계정에 회사가 지정되지 않았습니다.");
      }

      if (profile.is_active === false) {
        await supabaseClient.auth.signOut();
        throw new Error("사용이 중지된 계정입니다.");
      }

      const targetPage = COMPANY_MAIN_PAGES[profile.company_id];

      if (!targetPage) {
        await supabaseClient.auth.signOut();
        throw new Error("이 회사의 메인 화면은 아직 연결되지 않았습니다.");
      }

      window.location.replace(targetPage);
    }

    async function redirectExistingSession() {
      if (!supabaseClient) return;

      const {
        data: { session },
        error
      } = await supabaseClient.auth.getSession();

      if (error) {
        console.error("세션 확인 오류:", error);
        return;
      }

      if (session && session.user) {
        try {
          await redirectByCompany(session.user.id);
        } catch (redirectError) {
          console.error("기존 로그인 이동 오류:", redirectError);
          showMessage(redirectError.message, "error");
        }
      }
    }

    passwordToggle.addEventListener("click", function () {
      const isPassword = passwordInput.type === "password";

      passwordInput.type = isPassword ? "text" : "password";
      passwordToggle.textContent = isPassword ? "숨김" : "보기";
      passwordToggle.setAttribute(
        "aria-label",
        isPassword ? "비밀번호 숨기기" : "비밀번호 표시"
      );

      passwordInput.focus();
    });

    loginForm.addEventListener("submit", async function (event) {
      event.preventDefault();
      clearMessage();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showMessage("이메일과 비밀번호를 모두 입력해 주세요.", "error");
        return;
      }

      if (!emailInput.validity.valid) {
        showMessage("올바른 이메일 형식을 입력해 주세요.", "error");
        emailInput.focus();
        return;
      }

      if (!isSupabaseConfigured()) {
        showMessage(
          "Supabase URL과 Publishable/anon key를 먼저 설정해 주세요.",
          "error"
        );
        return;
      }

      setLoading(true);

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email,
          password
        });

        if (error || !data || !data.session) {
          console.error("로그인 실패:", error);
          showMessage("이메일 또는 비밀번호가 올바르지 않습니다.", "error");
          return;
        }

        if (!data.user) {
          throw new Error("로그인 사용자 정보를 확인하지 못했습니다.");
        }

        showMessage("로그인되었습니다. 회사 화면을 확인하고 있습니다.", "success");
        await redirectByCompany(data.user.id);
      } catch (error) {
        console.error("로그인 처리 오류:", error);
        showMessage(
          error && error.message
            ? error.message
            : "로그인 서버에 연결하지 못했습니다. 잠시 후 다시 확인해 주세요.",
          "error"
        );
      } finally {
        setLoading(false);
      }
    });

    async function initializeLoginPage() {
      if (!isSupabaseConfigured()) {
        return;
      }

      try {
        supabaseClient = createSupabaseClient();
        await redirectExistingSession();
      } catch (error) {
        console.error("초기화 오류:", error);
        showMessage(error.message, "error");
      }
    }

    initializeLoginPage();
  </script>
</body>
</html>
